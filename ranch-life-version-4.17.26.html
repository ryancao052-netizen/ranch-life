<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ranch Life</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#2C1810;overflow:hidden;margin:0}
#app{width:420px;height:880px;background:#F5E6C8;display:flex;flex-direction:column;position:fixed;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);transform-origin:top left}
#header{background:linear-gradient(180deg,#3D1C02,#6B3A2A);padding:14px 16px 10px;color:#F5E6C8;flex-shrink:0}
#header h1{font-size:20px;color:#D4A017;text-shadow:1px 1px 2px rgba(0,0,0,.5)}
.header-row{display:flex;justify-content:space-between;align-items:center}
.header-sub{font-size:10px;color:#C4A882;margin-top:1px}
.year-big{font-size:24px;color:#D4A017;font-weight:bold;text-align:right}
.stats-bar{display:flex;justify-content:space-between;margin-top:8px;background:rgba(0,0,0,.2);border-radius:8px;padding:6px 8px}
.stat-item{text-align:center;flex:1}
.stat-val{font-size:13px;font-weight:bold;color:#F5E6C8}
.stat-lbl{font-size:8px;color:#C4A882;margin-top:1px}
#content{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
#content::-webkit-scrollbar{width:4px}
#content::-webkit-scrollbar-thumb{background:#C4A882;border-radius:2px}
.btn{display:inline-block;padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-family:Georgia,serif;font-size:12px;font-weight:bold;transition:transform .1s,opacity .1s}
.btn:active{transform:scale(.97);opacity:.85}
.btn:disabled{opacity:.4;cursor:default;transform:none}
.btn-primary{background:#8B4513;color:#fff}
.btn-gold{background:linear-gradient(135deg,#D4A017,#B8860B);color:#3D1C02}
.btn-green{background:#4A7C3F;color:#fff}
.btn-danger{background:#A0302B;color:#fff}
.btn-ghost{background:rgba(139,69,19,.12);color:#6B3A2A}
.btn-sm{padding:5px 10px;font-size:10px}

#next-year-btn{background:linear-gradient(180deg,#8B4513,#6B3A2A);color:#D4A017;border:none;padding:12px;font-size:16px;font-family:Georgia,serif;font-weight:bold;cursor:pointer;width:100%;letter-spacing:.5px;flex-shrink:0}

.card{background:#fff;border-radius:12px;padding:12px;margin-bottom:9px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.horse-card{background:#fff;border-radius:12px;padding:10px;margin-bottom:8px;box-shadow:0 2px 5px rgba(0,0,0,.08);display:flex;align-items:center;cursor:pointer;transition:transform .1s;position:relative}
.horse-card:active{transform:scale(.98)}
.horse-card.fav{border-left:4px solid #D4A017}
.horse-avatar{font-size:32px;margin-right:8px;line-height:1}
.horse-info{flex:1;min-width:0}
.horse-name{font-size:14px;font-weight:bold;color:#3D1C02}
.horse-sub{font-size:10px;color:#8B6A5A;margin-top:1px}
.horse-right{text-align:right;font-size:10px;color:#8B6A5A;flex-shrink:0;margin-left:6px}
.sbar{margin:2px 0}
.sbar-label{font-size:9px;color:#6B3A2A;margin-bottom:1px}
.sbar-bg{height:6px;background:#E8D5B7;border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;transition:width .3s}
.fill-speed{background:linear-gradient(90deg,#E74C3C,#F39C12)}

.fill-trained{background:linear-gradient(90deg,#3498DB,#2980B9)}
.fill-stamina{background:linear-gradient(90deg,#8E44AD,#9B59B6)}
.tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;margin:1px 1px}

.ev{padding:8px 10px;margin-bottom:6px;border-radius:8px;font-size:11px;line-height:1.4}
.ev-good{background:#E8F5E9;border-left:3px solid #27AE60;color:#1B5E20}
.ev-bad{background:#FFEBEE;border-left:3px solid #C0392B;color:#7F0000}

.ev-race{background:#E3F2FD;border-left:3px solid #1565C0;color:#0D47A1}
.ev-death{background:#F3E5F5;border-left:3px solid #6A1B9A;color:#4A148C}

.sec-title{font-size:16px;color:#3D1C02;font-weight:bold;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #D4A017}

#modal-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;z-index:100}

.auction-lot{background:#fff;border-radius:12px;padding:12px;margin-bottom:9px;box-shadow:0 2px 6px rgba(0,0,0,.08);border:2px solid #E8D5B7}

.ped-box .coat{color:#8B6A5A}
.money{color:#B8860B;font-weight:bold}
.flex-row{display:flex;justify-content:space-between;align-items:center}
.mt-sm{margin-top:6px}
.mt-md{margin-top:12px}
.text-center{text-align:center}
.text-sm{font-size:11px}
.text-xs{font-size:9px}
.text-muted{color:#8B6A5A}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
select{width:100%;padding:7px;border-radius:8px;border:1px solid #D4A017;font-family:Georgia,serif;font-size:12px;background:#fff}
.filter-bar{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.filter-btn{padding:4px 10px;border-radius:12px;border:1px solid #D4A017;background:#fff;font-family:Georgia,serif;font-size:10px;cursor:pointer;color:#6B3A2A}

.race-lane{display:flex;align-items:center;margin:4px 0;height:24px;position:relative}

.race-runner{position:absolute;left:0;top:-8px;font-size:20px;transition:left .15s linear}

.year-summary{max-height:70vh;overflow-y:auto}
.year-summary .sum-item{padding:6px 0;border-bottom:1px solid #E8D5B7;font-size:12px}
.year-summary .sum-item:last-child{border:none}
.fav-star{position:absolute;top:4px;right:4px;font-size:14px;cursor:pointer;z-index:2}
.mg-track{height:28px;border-radius:6px;position:relative;overflow:hidden;margin:10px 0;cursor:pointer;background:#E8D5B7}
.mg-green{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#27AE60,#2ECC71);width:18%}
.mg-yellow{position:absolute;left:18%;top:0;height:100%;background:linear-gradient(90deg,#F39C12,#F1C40F);width:52%}
.mg-red{position:absolute;left:70%;top:0;height:100%;background:linear-gradient(90deg,#E74C3C,#C0392B);width:30%}

.mg-check-row{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0}
.mg-dot{width:16px;height:16px;border-radius:50%;background:#E8D5B7;border:2px solid #C4A882;flex-shrink:0}
.mg-dot.green{background:#27AE60;border-color:#1B5E20}
.mg-dot.yellow{background:#F39C12;border-color:#B7770D}
.mg-dot.red{background:#E74C3C;border-color:#922B21}
.reel-wrap{overflow:hidden;border-radius:10px;border:2px solid #D4A017;margin:10px 0;position:relative}
.reel-strip{display:flex;transition:transform 4.5s cubic-bezier(0.12,0,0.08,1.0)}
.reel-card{flex-shrink:0;width:80px;height:90px;border-radius:8px;background:#fff;border:2px solid #E8D5B7;margin:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4px}
.reel-card .r-icon{font-size:26px;line-height:1}
.reel-card .r-name{font-size:9px;font-weight:bold;color:#3D1C02;margin-top:2px}
.reel-card .r-sub{font-size:7px;color:#8B6A5A;margin-top:1px}
.reel-card.winner{border:3px solid #D4A017;background:#FFF8E1;transform:scale(1.05);box-shadow:0 2px 8px rgba(212,160,23,.4)}
.trait-header{background:linear-gradient(135deg,#FFF8E1,#F5E6C8);border:1px solid #D4A017;border-radius:10px;padding:10px 12px;margin-bottom:8px}
#debug-panel{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:500;display:none;overflow-y:auto;padding:10px;font-family:Georgia,serif}
#debug-panel.show{display:block}
.dbg-section{background:#1a1a1a;border-radius:7px;padding:8px;margin-bottom:7px;border:1px solid #333}
.dbg-title{color:#D4A017;font-size:9px;font-weight:bold;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px}
.dbg-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:3px;align-items:center}
.dbg-btn{background:#2a2a2a;color:#ddd;border:1px solid #444;border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:Georgia,serif;white-space:nowrap}
.dbg-btn:hover{background:#444}
.dbg-btn.gold{background:#6B4A00;border-color:#D4A017;color:#F5E6C8}
.dbg-btn.green{background:#1a3d2a;border-color:#27AE60;color:#a8e6c1}
.dbg-btn.red{background:#3d1a1a;border-color:#E74C3C;color:#f5a8a8}
.dbg-input{background:#111;color:#ddd;border:1px solid #444;border-radius:4px;padding:3px 5px;font-size:10px;width:65px;font-family:Georgia,serif}
.dbg-select{background:#111;color:#ddd;border:1px solid #444;border-radius:4px;padding:3px 5px;font-size:10px;font-family:Georgia,serif;width:100%}
.dbg-note{color:#777;font-size:9px;margin:2px 0}
</style>
</head>
<body>
<div id="app">
<div id="cutscene"><div id="cutscene-box"><div id="cs-content"></div></div></div>
<div id="header">
<div class="header-row">
<div><h1 id="title-display">Ranch Life</h1><div class="header-sub" id="ranch-name-disp"></div></div>
<div><div class="year-big" id="year-disp">Year 1</div><div class="header-sub" style="text-align:right">Your Legacy</div></div>
</div>
<div class="stats-bar">
<div class="stat-item"><div class="stat-val" id="money-disp">$6,500</div><div class="stat-lbl">Money</div></div>
<div class="stat-item"><div class="stat-val" id="horse-disp">1/6</div><div class="stat-lbl">Horses</div></div>
<div class="stat-item"><div class="stat-val" id="ranch-disp">Lv1</div><div class="stat-lbl">Ranch</div></div>
</div>
</div>
<div id="content"></div>
<button id="next-year-btn" onclick="G.confirmNextYear()">NEXT YEAR</button>
<div id="tab-bar">
<div class="tab active" data-tab="home" onclick="G.tab('home')"><div class="tab-icon">🏠</div>Home</div>
<div class="tab" data-tab="horses" onclick="G.tab('horses')"><div class="tab-icon">🐴</div>Horses</div>
<div class="tab" data-tab="auction" onclick="G.tab('auction')"><div class="tab-icon">🔨</div>Auction</div>
<div class="tab" data-tab="race" onclick="G.tab('race')"><div class="tab-icon">🏁</div>Race</div>
<div class="tab" data-tab="ranch" onclick="G.tab('ranch')"><div class="tab-icon">🏡</div>Ranch</div>
<div class="tab" data-tab="legacy" onclick="G.tab('legacy')"><div class="tab-icon">🏆</div>Legacy</div>
</div>
<div id="modal-bg" onclick="G.closeModal(event)"><div id="modal"><div id="modal-content"></div></div></div>
<div id="debug-panel"></div>
<div id="toast"></div>
</div>
<script>
// ===== UTILS =====
const R=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const pct=v=>Math.min(100,Math.max(0,v));
const $=id=>document.getElementById(id);
const money=v=>{if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(v>=1e4)return'$'+(v/1e3).toFixed(1)+'K';return'$'+v.toLocaleString()};

// ===== DEBUG FLAG =====
const DEBUG_MODE=true;

// ===== NAME PARTS FOR BREEDING NAMES =====
const NAME_PRE=['Thunder','Storm','Shadow','Golden','Silver','Dark','Iron','Royal','Wild','Lucky','Noble','Swift','Proud','Midnight','Crystal','Diamond','Star','Moon','Sun','Fire','Ice','Phantom','Mystic','Ancient','Silent'];
const NAME_SUF=['dancer','runner','spirit','dream','glory','strike','blaze','heart','song','wind','fury','charm','reign','flight','legend','legacy','pride','storm','fire','light','shadow','mist','vale','born','call'];
const CHAMP_NAMES=['Secretariat','Seabiscuit','Man O\' War','Citation','Affirmed','Seattle Slew','War Admiral','Whirlaway','Gallant Fox','Omaha','Count Fleet','Assault','American Pharoah','Justify','Ruffian','Zenyatta','Winx','Frankel','Black Caviar','Phar Lap','Kelso','Cigar','Curlin','Arrogate','Flightline'];

function breedName(sireName,damName){
  // Combo name: take prefix from sire, suffix from dam
  let sWords=sireName.split(/(?=[A-Z])|[\s'-]+/).filter(Boolean);
  let dWords=damName.split(/(?=[A-Z])|[\s'-]+/).filter(Boolean);
  let pre=sWords[0]||pick(NAME_PRE);
  let suf=dWords.length>1?dWords[dWords.length-1]:pick(NAME_SUF);
  // Sometimes use name parts instead
  if(Math.random()<.3)pre=pick(NAME_PRE);
  if(Math.random()<.3)suf=pick(NAME_SUF);
  // Clean up
  suf=suf.charAt(0).toLowerCase()+suf.slice(1);
  let name=pre+suf.charAt(0).toUpperCase()+suf.slice(1);
  // Sometimes add "II" or "'s"
  if(Math.random()<.1)name=sireName+"'s "+pick(NAME_SUF).charAt(0).toUpperCase()+pick(NAME_SUF).slice(1);
  if(Math.random()<.08)name=pre+" "+damName.split(' ')[0];
  return name.substring(0,18);
}

// ===== GENE DATA =====
const BREEDS=['Quarter Horse','Thoroughbred','Arabian','Appaloosa','Paint Horse','Morgan','Andalusian','Friesian'];
const NAMES_M=['Thunder','Blaze','Copper','Duke','Ranger','Scout','Bandit','Phoenix','Ace','Storm','Flint','Canyon','Maverick','Jasper','Titan','Atlas','Apollo','Cash','Gunner','King','Chief','Buck','Bolt','Rocket','Saber'];
const NAMES_F=['Luna','Star','Rosie','Willow','Sienna','Sage','Ember','Misty','Daisy','Penny','Ivy','Hazel','Ruby','Ginger','Clover','Maple','Cinnamon','Bonnie','Lady','Belle','Spirit','Honey','Pearl','Dove','Fern'];
const TEMPERAMENTS=['Bold','Calm','Spirited','Nervous','Stubborn','Fierce'];
const SPECIAL_GENES=['lightning','champion','iron','nightbloom','windlegacy','truegrit'];
const SPECIAL_INFO={
  lightning:{name:'Lightning',icon:'⚡',desc:'+20 speed ceiling, higher injury risk'},
  champion:{name:'Champion Heart',icon:'🏆',desc:'Performs above stats in high-stakes races'},
  iron:{name:'Iron Constitution',icon:'🛡️',desc:'Near-immune to illness and injury'},
  nightbloom:{name:'Night Bloom',icon:'🌙',desc:'Offspring inherit +10 bonus to all stats'},
  windlegacy:{name:'Wind Legacy',icon:'💨',desc:'Speed genes express more strongly in foals'},
  truegrit:{name:'True Grit',icon:'🎯',desc:'Never DNFs a race regardless of conditions'}
};

// ===== COAT COLOR =====
function resolveCoat(genes){
  let base;
  if(genes.E[0]==='e'&&genes.E[1]==='e')base='chestnut';
  else if(genes.A[0]==='a'&&genes.A[1]==='a')base='black';
  else base='bay';
  let name=base.charAt(0).toUpperCase()+base.slice(1);
  let crCount=(genes.Cr[0]==='Cr'?1:0)+(genes.Cr[1]==='Cr'?1:0);
  if(crCount===2){
    if(base==='chestnut')name='Cremello';else if(base==='bay')name='Perlino';else name='Smoky Cream';
  }else if(crCount===1){
    if(base==='chestnut')name='Palomino';else if(base==='bay')name='Buckskin';else name='Smoky Black';
  }
  if(genes.D[0]==='D'||genes.D[1]==='D'){
    if(base==='bay')name='Dun';else if(base==='chestnut')name='Red Dun';else name='Grullo';
  }
  if(genes.Rn[0]==='Rn'||genes.Rn[1]==='Rn'){
    if(base==='bay')name='Bay Roan';else if(base==='black')name='Blue Roan';else name='Strawberry Roan';
  }
  if(genes.G[0]==='G'||genes.G[1]==='G')name='Grey';
  if(genes.To[0]==='To'||genes.To[1]==='To')if(!name.includes('Grey'))name+=' Tobiano';
  if(genes.Lp[0]==='Lp'||genes.Lp[1]==='Lp')if(!name.includes('Grey')){
    name=(genes.Lp[0]==='Lp'&&genes.Lp[1]==='Lp'?'Leopard ':'Blanket ')+name;
  }
  return name;
}
function randomAllele(dom,rec,p){return Math.random()<p?dom:rec}
function inheritAllele(parent,locus){return pick(parent.genes[locus])}
function randomCoatGenes(){
  return{E:[randomAllele('E','e',.65),randomAllele('E','e',.65)],A:[randomAllele('A','a',.7),randomAllele('A','a',.7)],
    Cr:[randomAllele('Cr','cr',.08),randomAllele('Cr','cr',.08)],G:[randomAllele('G','g',.06),randomAllele('G','g',.06)],
    D:[randomAllele('D','nd',.1),randomAllele('D','nd',.1)],Rn:[randomAllele('Rn','rn',.1),randomAllele('Rn','rn',.1)],
    To:[randomAllele('To','to',.08),randomAllele('To','to',.08)],Lp:[randomAllele('Lp','lp',.06),randomAllele('Lp','lp',.06)]};
}
function randomMarkings(){
  return{face:Math.random()<.4?pick(['Blaze','Star','Snip','Stripe']):null,
    legs:[Math.random()<.3?pick(['Sock','Stocking']):null,Math.random()<.3?pick(['Sock','Stocking']):null,
          Math.random()<.3?pick(['Sock','Stocking']):null,Math.random()<.3?pick(['Sock','Stocking']):null]};
}
function inheritMarkings(p1,p2){
  let face=null;
  if(p1.markings.face&&Math.random()<.5)face=p1.markings.face;
  else if(p2.markings.face&&Math.random()<.5)face=p2.markings.face;
  let legs=[];for(let i=0;i<4;i++){
    if((p1.markings.legs[i]&&Math.random()<.5)||(p2.markings.legs[i]&&Math.random()<.5))legs.push(pick(['Sock','Stocking']));
    else legs.push(null);
  }
  return{face,legs};
}

// ===== PERFORMANCE (A–Z ALLELE SYSTEM) =====
const ALLELE_VAL={A:100,B:91,C:83,D:76,E:70,F:65,G:60,H:56,I:52,J:48,K:45,L:42,M:39,N:36,O:33,P:30,Q:27,R:24,S:21,T:18,U:15,V:12,W:9,X:6,Y:3,Z:1};
function randomPerfGenes(tier){
  const pools={
    low:['N','O','P','Q','R','S','T'],
    lowmid:['K','L','M','N','O','P'],
    mid:['I','J','K','L','M','N','O'],
    midhigh:['F','G','H','I','J','K'],
    upper:['D','E','F','G','H'],
    high2:['C','D','E','F'],
    veryhigh:['B','C','D'],
    elite:['A','B','C'],
    high:['D','E','F','G','H','I','J'],
    random:['H','I','J','K','L','M','N','O','P']
  };
  let p=pools[tier]||pools.random;
  return{Sp:[pick(p),pick(p)],St:[pick(p),pick(p)],Hh:[randomAllele('H','h',.7),randomAllele('H','h',.7)],Tr:[pick(['E','N','N','R']),pick(['E','N','N','R'])]};
}
function calcSpeed(h){
  let v=Math.round((ALLELE_VAL[h.genes.Sp[0]]+ALLELE_VAL[h.genes.Sp[1]])/2*(h.expressionMult||1));
  return clamp(v,1,100);
}
function calcStamina(h){
  let v=Math.round((ALLELE_VAL[h.genes.St[0]]+ALLELE_VAL[h.genes.St[1]])/2*(h.expressionMult||1));
  return clamp(v,1,100);
}
function calcHealthCeiling(h){return clamp((h.genes.Hh[0]==='H'?40:15)+(h.genes.Hh[1]==='H'?40:15)+20-Math.floor((h.inbreedCoeff||0)*80)-(h.permHealthCeilLoss||0),15,100)}
function calcHealth(h){
  let c=calcHealthCeiling(h);
  let agePen=0;
  if(h.age>12)agePen=(h.age-12)*3;
  if(h.age>16)agePen+=(h.age-16)*4;
  let condPen=(h.conditions||[]).reduce((s,cd)=>s+cd.severity*3,0);
  return clamp(c-agePen-condPen+(h.healPool||0),0,100);
}
function effectiveSpeed(h){return Math.max(1,h.speed-(h.permSpeedLoss||0))}
function effectiveStamina(h){return Math.max(1,h.stamina-(h.permStaminaLoss||0))}
function trainMult(h){return 1+0.001*(h.trained||0)}
function trainBonus(h){return Math.round(effectiveSpeed(h)*0.001*(h.trained||0))}
function trainStamBonus(h){return Math.round(effectiveStamina(h)*0.001*(h.trained||0))}
function trainCostAt(lvl){return Math.round(100+12*lvl+0.9*lvl*lvl)}

function emptySpecialGenes(){let s={};SPECIAL_GENES.forEach(g=>{s[g]=['N','N']});return s}

function rollExpression(){let r=Math.random();if(r<.05)return 1.25+Math.random()*.1;if(r<.15)return 1.12+Math.random()*.08;if(r<.4)return 1.04+Math.random()*.06;if(r<.8)return .97+Math.random()*.06;if(r<.95)return .82+Math.random()*.08;return .7+Math.random()*.08}
function exprLabel(m){if(m>=1.25)return'Exceptional';if(m>=1.12)return'Talented';if(m>=1.04)return'Above Avg';if(m>=.97)return'Normal';if(m>=.82)return'Below Avg';return'Weak'}

// ===== INBREEDING =====
function calcInbreeding(sId,dId,all){
  if(!sId||!dId)return 0;
  let sa={},da={};
  function ga(id,d,out){if(d>3||!id)return;let h=all.find(x=>x.id===id);if(!h)return;out[id]=(out[id]||0)+1;ga(h.sireId,d+1,out);ga(h.damId,d+1,out)}
  ga(sId,0,sa);ga(dId,0,da);
  let shared=0,total=0;
  for(let id in sa){if(da[id])shared+=sa[id]+da[id]}
  for(let id in sa)total+=sa[id];for(let id in da)total+=da[id];
  return total?Math.min(1,shared/total):0;
}
function inbreedLabel(c){if(c<.04)return'Outcross';if(c<.07)return'Line-bred';if(c<.13)return'Inbred';if(c<.25)return'Highly Inbred';return'Dangerously Inbred'}

let nextId=1;
const allHorses=[];
function makeHorse(o={}){
  let g=o.gender||(Math.random()>.5?'M':'F'),br=o.breed||pick(BREEDS),nm=o.name||pick(g==='M'?NAMES_M:NAMES_F),age=o.age??R(2,7);
  let genes={...randomCoatGenes(),...randomPerfGenes(o.tier||'random'),special:emptySpecialGenes()};
  if(o.genes)for(let k in o.genes){if(k==='special')Object.assign(genes.special,o.genes.special);else genes[k]=o.genes[k]}
  // Market horses have small chance of carrying ONE copy of a special gene
  if(!o.skipSpecialRoll&&Math.random()<.06){let sg=pick(SPECIAL_GENES);genes.special[sg]=[sg,'N']}
  let h={id:nextId++,gender:g,breed:br,name:nm,age,genes,temperament:o.temperament||randomTemperament(),
    markings:o.markings||randomMarkings(),expressionMult:o.expressionMult||rollExpression(),
    inbreedCoeff:o.inbreedCoeff||0,trained:0,wins:0,races:0,maxRaces:10,trophies:0,medals:{gold:0,silver:0,bronze:0,derbyGold:0,derbySilver:0,derbyBronze:0},
    sireId:o.sireId||null,damId:o.damId||null,
    conditions:[],scars:[],healPool:0,
    permSpeedLoss:0,permStaminaLoss:0,permHealthCeilLoss:0,permInjChance:0,aftereffects:[],
    menopausal:false,
    retired:false,bloodlineTier:o.bloodlineTier||'mid',
    discovered:{expression:false,specials:[]},tested:false,dead:false,deathYear:null,deathCause:null,
    favorite:false,studOffers:[],raceTiersCleared:[],derbyEntered:false};
  h.coat=resolveCoat(h.genes);h.tempName=resolveTemperament(h.temperament);
  h.speed=calcSpeed(h);h.stamina=calcStamina(h);h.health=calcHealth(h);h.value=calcValue(h);
  allHorses.push(h);return h;
}
const BLOODLINE_MOD={low:0.92,mid:1.00,high:1.10,elite:1.22};
function calcValue(h){
  let v=h.speed*35+h.stamina*20+h.health*15+h.wins*800;
  let rare=['Cremello','Perlino','Palomino','Buckskin','Grullo'];
  if(rare.some(c=>h.coat.includes(c)))v+=1500;
  if(h.coat.includes('Leopard'))v+=2000;
  if(h.coat.includes('Tobiano'))v+=800;
  v+=expressedSpecials(h).length*3000;
  if(h.races>=3&&h.wins/h.races>.6)v=Math.floor(v*1.5);
  if(h.races>=5&&h.wins/h.races>.7)v=Math.floor(v*2);
  v=Math.floor(v*(1-(h.inbreedCoeff||0)*.5));
  // Young horse discount: age 0-1 very low, age 2 low, age 3+ normal
  if(h.age===0)v=Math.floor(v*0.12);
  else if(h.age===1)v=Math.floor(v*0.22);
  else if(h.age===2)v=Math.floor(v*0.48);
  // Age decay for older horses
  if(h.age>=6){
    let tr=Math.min(h.trophies||0,200);
    let trophyMult=Math.min(1+0.006*tr,1.75);
    let bmod=BLOODLINE_MOD[h.bloodlineTier||'mid']||1.00;
    v=Math.floor(v*Math.exp(-0.085*(h.age-5))*trophyMult*bmod);
  }
  if(h.menopausal)v=Math.floor(v*0.5);
  return Math.max(200,v);
}
function refreshStats(h){h.health=calcHealth(h);h.value=calcValue(h)}

// ===== CONDITIONS SYSTEM =====
function worsenConditions(g,h){
  if(!h.conditions||!h.conditions.length)return;
  let untreated=h.conditions.filter(c=>!c.treatedThisYear);
  untreated.forEach(c=>{
    c.yearsUntreated=(c.yearsUntreated||0)+1;
    let sevIncrChance=Math.min(0.08+0.04*c.yearsUntreated+0.015*c.severity,0.45);
    if(Math.random()<sevIncrChance){c.severity=Math.min(10,c.severity+1)}
    if(c.severity>=10){h.dead=true;h.deathCause='untreated condition';h.deathYear=g.year;return}
  });
  h.conditions.forEach(c=>{c.treatedThisYear=false});
  // Secondary condition chance
  let untreatedCount=untreated.length;
  let secChance=Math.min(0.04+0.02*untreatedCount,0.15);
  if(Math.random()<secChance&&untreatedCount>0){
    h.conditions.push({name:'Secondary Infection',type:'sickness',severity:R(1,3),yearsUntreated:0,treatedThisYear:false});
    g.addEvent(`🦠 ${h.name} developed a secondary infection!`,'bad');
  }
  // Death check from untreated illness
  let health=calcHealth(h);
  if(health<20&&untreatedCount>0){
    let deathChance=Math.min(0.01+0.01*untreatedCount+0.005*(20-health),0.20);
    if(Math.random()<deathChance){h.dead=true;h.deathCause='illness complications';h.deathYear=g.year}
  }
}

// ===== MENOPAUSE =====
function rollMenopause(g,h){
  if(h.gender!=='F'||h.menopausal)return;
  const rates={13:0.10,14:0.20,15:0.35,16:0.55,17:0.75};
  let rate=h.age>=18?1.0:(rates[h.age]||0);
  if(rate>0&&Math.random()<rate){
    h.menopausal=true;
    g.addEvent(`🌸 ${h.name} has entered menopause.`,'neutral');
  }
}

function foalSuccessChance(dam){

  let agePen=dam.age>=14?0.46:(agePenTable[dam.age]||0);

// ===== BREED FOAL =====
function breedFoal(sire,dam){
  try{
  let genes={};
  ['E','A','Cr','G','D','Rn','To','Lp'].forEach(l=>{genes[l]=[inheritAllele(sire,l),inheritAllele(dam,l)]});
  ['Sp','St','Hh','Tr'].forEach(l=>{genes[l]=[inheritAllele(sire,l),inheritAllele(dam,l)]});
  // Special genes: inherit from parents normally
  let special=emptySpecialGenes();
  SPECIAL_GENES.forEach(g=>{special[g]=[pick(sire.genes.special[g]),pick(dam.genes.special[g])]});
  // 1% chance this breeding produces a NEW random special gene mutation
  let _pendingMutation=null;
  if(G.dbgForceMutation||Math.random()<.01){let sg=pick(SPECIAL_GENES);special[sg]=[sg,sg];_pendingMutation=sg;G.dbgForceMutation=false}
  // Throwback 5%
  if(Math.random()<.05){
    let gpId=pick([sire.sireId,sire.damId,dam.sireId,dam.damId].filter(Boolean));
    let gp=allHorses.find(x=>x.id===gpId);
    if(gp){let l=pick(['E','A','Cr','G','D','Rn','To','Lp','Sp','St']);genes[l][R(0,1)]=pick(gp.genes[l])}
  }
  genes.special=special;
  let ic=calcInbreeding(sire.id,dam.id,allHorses);
  let nbBonus=0;if(expressedSpecials(sire).includes('nightbloom'))nbBonus+=10;if(expressedSpecials(dam).includes('nightbloom'))nbBonus+=10;
  let wl=1;if(expressedSpecials(sire).includes('windlegacy'))wl+=.15;if(expressedSpecials(dam).includes('windlegacy'))wl+=.15;
  let expr=rollExpression();if(ic<.04)expr+=.03;
  let foalName=breedName(sire.name,dam.name);
  // Bloodline tier: escalate if either parent is higher
  const tierRank={low:0,mid:1,high:2,elite:3};
  let sTier=sire.bloodlineTier||'mid',dTier=dam.bloodlineTier||'mid';
  let foalTier=tierRank[sTier]>=tierRank[dTier]?sTier:dTier;
  let foal=makeHorse({gender:Math.random()>.5?'M':'F',breed:Math.random()>.5?sire.breed:dam.breed,name:foalName,
    age:0,genes,temperament:[pick(sire.temperament),pick(dam.temperament)],markings:inheritMarkings(sire,dam),
    expressionMult:expr*wl,inbreedCoeff:ic,sireId:sire.id,damId:dam.id,bloodlineTier:foalTier,skipSpecialRoll:true});
  if(nbBonus>0){foal.speed=clamp(foal.speed+nbBonus,10,100);foal.stamina=clamp(foal.stamina+nbBonus,10,100)}
  if(_pendingMutation)foal.mutationGene=_pendingMutation;
  foal.value=calcValue(foal);return foal;
  }catch(e){console.error('breedFoal error:',e);return null}
}

function generateBidders(horse,tierNum){
  let t=typeof tierNum==='number'?tierNum:1;
  let count=t>=6?R(4,6):t>=3?R(3,5):R(2,4);
  let bidders=[];for(let i=0;i<count;i++){
    let b={...pick(BIDDER_TYPES)};let interest=1;
    if(b.pref==='rarecoat'&&['Cremello','Perlino','Palomino','Leopard','Tobiano'].some(c=>horse.coat.includes(c)))interest+=.8;
    if(b.pref==='speed'&&horse.speed>=70)interest+=.5;
    if(b.pref==='genes'&&(horse.tested||expressedSpecials(horse).length))interest+=.6;
    if(b.pref==='random')interest+=Math.random()*.6;
    b.maxBid=Math.floor(horse.value*b.maxMult*Math.max(.3,interest)*(.8+Math.random()*.4));
    b.active=true;b.lastBid=0;bidders.push(b);
  }

  if(G.reputation>0)bidders.forEach(b=>{b.maxBid=Math.floor(b.maxBid*(1+G.reputation/200))});

}

function triRand(lo,hi){
  let mode=lo+0.68*(hi-lo);let c=(mode-lo)/(hi-lo);let u=Math.random();
  if(u<c)return lo+Math.sqrt(u*(hi-lo)*(mode-lo));
  return hi-Math.sqrt((1-u)*(hi-lo)*(hi-mode));
}
function weightedPick(items,weights){
  let total=weights.reduce((a,b)=>a+b,0);let r=Math.random()*total;
  for(let i=0;i<items.length;i++){r-=weights[i];if(r<=0)return items[i];}
  return items[items.length-1];
}
function coatRarityClass(coat){
  if(coat.includes('Leopard')||coat.includes('Cremello')||coat.includes('Perlino'))return 2;
  if(coat.includes('Palomino')||coat.includes('Buckskin')||coat.includes('Grullo')||
     coat.includes('Roan')||coat.includes('Tobiano')||coat.includes('Blanket'))return 1;
  return 0;
}
function generateAuctionLot(tierNum){
  let at=AUCTION_TIERS[tierNum]||AUCTION_TIERS[1];
  let blRoll=Math.random()*100,blCum=0;
  let blTiers=['low','mid','high','elite'];let bloodlineTier='mid';
  for(let i=0;i<4;i++){blCum+=at.bl[i];if(blRoll<blCum){bloodlineTier=blTiers[i];break;}}
  let crRoll=Math.random()*100,targetRarity=0;
  if(crRoll>=at.coatRarity[0]+at.coatRarity[1])targetRarity=2;
  else if(crRoll>=at.coatRarity[0])targetRarity=1;
  let h=makeHorse({age:R(3,5),tier:at.perfTier,bloodlineTier,skipSpecialRoll:true});
  for(let attempt=0;attempt<20;attempt++){
    if(coatRarityClass(h.coat)===targetRarity)break;
    Object.assign(h.genes,randomCoatGenes());h.coat=resolveCoat(h.genes);
  }
  if(at.special){
    if(Math.random()<(at.special.double||0)){let sg=pick(SPECIAL_GENES);h.genes.special[sg]=[sg,sg];}
    else if(Math.random()<(at.special.single||0)){let sg=pick(SPECIAL_GENES);h.genes.special[sg]=[sg,'N'];}
  }
  h.speed=calcSpeed(h);h.stamina=calcStamina(h);h.value=Math.round(calcValue(h)*at.priceBase);
  h._auctionTier=tierNum;return h;
}

function canEnterRace(horse,race){
  if(!horse)return{ok:false,reason:'Select a horse'};
  if(horse.age>5)return{ok:false,reason:'Too old to race (max age 5)'};
  if(horse.age<race.minAge||horse.age>race.maxAge)return{ok:false,reason:race.tier===10?'Age 3 only':'Age '+race.minAge+'+'};
  if(race.tier===10&&horse.derbyEntered)return{ok:false,reason:'Already entered KD'};
  if(horse.races>=(horse.maxRaces||10))return{ok:false,reason:'Race limit reached'};
  let cleared=horse.raceTiersCleared||[];
  for(let t=1;t<race.tier;t++){
    if(!cleared.includes(t))return{ok:false,reason:'Podium T'+t+' first'};
  }
  return{ok:true};
}

// ===== STUD OFFER FUNCTIONS =====
function studDesirability(h){
  const bScore={low:0,mid:1,high:2,elite:3}[h.bloodlineTier||'mid']||1;
  let T=Math.min(h.wins||0,20);
  let W=h.wins||0,V=h.value||0,S=expressedSpecials(h).length,B=bScore;
  return 5*T+2*W+0.00008*V+8*S+4*B;
}
function studOfferChance(h){return Math.min(0.10+0.012*studDesirability(h),0.85)}
function studOfferFee(h){
  const bMult={low:0.9,mid:1.0,high:1.15,elite:1.35}[h.bloodlineTier||'mid']||1.0;
  let T=Math.min(h.wins||0,20),W=h.wins||0,V=h.value||0,S=expressedSpecials(h).length;
  let fee=(250+260*T+140*W+0.07*V)*bMult*Math.pow(1.2,S);
  return Math.round(fee/50)*50;
}

    // Conditions

      html+=`<div class="sec-sub">⚠️ Conditions</div>`;
      h.conditions.forEach((cond,ci)=>{
        let hlth=calcHealth(h),m=100-hlth;

          <div class="flex-row"><span style="font-weight:bold;font-size:11px">${cond.type==='injury'?'🦴':'🦠'} ${cond.name}</span>
            <span class="text-xs text-muted">Sev ${cond.severity}/10${cond.treatedThisYear?' ✅':''} ${cond.yearsUntreated>0?' ('+cond.yearsUntreated+'yr untreated)':''}</span>

  trainHorse(id){
    let h=G.horses.find(x=>x.id===id);if(!h)return;
    if(h.retired){G.toast('Retired horses cannot train!');return}
    if((h.trained||0)>=100){G.toast('Training maxed out!');return}
    if(h.age<2){G.toast('Too young!');return}
    let cost=trainCostAt(h.trained||0);
    if(G.money<cost){G.toast(`Need ${money(cost)}!`);return}
    G.money-=cost;
    let gain=Math.min(100-(h.trained||0),trainSpd(h.tempName)+R(-2,3));
    h.trained=Math.min(100,(h.trained||0)+gain);
    if(h.trained>20)h.discovered.expression=true;
    // Training injury (1% base, modified by health)
    let trainInjChance=0.01;
    let th=calcHealth(h);
    let thMod=th>=90?-0.02:th>=70?-0.01:th>=50?0:th>=30?0.02:0.04;
    trainInjChance+=thMod;
    if(Math.random()<trainInjChance){
      let sev=R(1,5);
      h.conditions.push({name:'Training Strain',type:'injury',severity:sev,yearsUntreated:0,treatedThisYear:false});
      G.addEvent(`⚠️ ${h.name} suffered a training strain (severity ${sev})!`,'bad');
    }
    refreshStats(h);
    if(G.tutStage==='tut_train'&&id===G._tutHorseId){G.tutStage='tut_race';G.toast(`${h.name} trained! Now take them to the Race tab.`);}
    else G.toast(`${h.name} +${gain} training!`);
    G.showHorseDetail(id);G.updateUI();
  },
  testHorse(id){
    let h=G.horses.find(x=>x.id===id);if(!h)return;
    if(h.tested){G.toast('Already tested!');return}if(G.money<800){G.toast('Need $800!');return}
    G.money-=800;h.tested=true;h.discovered.expression=true;
    let r=[];carriedSpecials(h).forEach(s=>r.push('Carries '+SPECIAL_INFO[s].icon));
    expressedSpecials(h).forEach(s=>r.push('Expresses '+SPECIAL_INFO[s].icon));
    r.push('Speed: '+h.genes.Sp.join('/')+' Stam: '+h.genes.St.join('/'));
    G.addEvent('🧬 Test for '+h.name+': '+r.join(', '),'neutral');
    G.toast('Test complete!');G.showHorseDetail(id);G.updateUI();
  },

    if(!G.auctionHorses.length){h+=`<div class="empty"><div class="icon">🔨</div>No horses. Come back next year!</div>`;return h}
    G.auctionHorses.forEach((horse,i)=>{
      let sp=expressedSpecials(horse);
      h+=`<div class="auction-lot">
        <div class="flex-row"><div><span style="font-size:20px">${horse.gender==='M'?'🐴':'🐎'}</span>
          <strong style="color:#3D1C02"> ${horse.name}</strong> <span class="tag tag-${horse.gender==='M'?'m':'f'}">${horse.gender==='M'?'♂':'♀'}</span>
          ${sp.map(s=>'<span class="tag tag-special">'+SPECIAL_INFO[s].icon+'</span>').join('')}
        </div><span style="background:#D4A017;color:#3D1C02;padding:2px 8px;border-radius:10px;font-weight:bold;font-size:12px">${money(horse.value)}</span></div>
        <div class="text-xs text-muted mt-sm">${horse.coat} ${horse.breed} · Age ${horse.age} · ${horse.tempName}</div>
        <div class="sbar"><div class="sbar-label">⚡ ${horse.speed}</div><div class="sbar-bg"><div class="sbar-fill fill-speed" style="width:${pct(horse.speed)}%"></div></div></div>
        <div class="sbar"><div class="sbar-label">💪 ${horse.stamina}</div><div class="sbar-bg"><div class="sbar-fill fill-stamina" style="width:${pct(horse.stamina)}%"></div></div></div>
        <div class="sbar"><div class="sbar-label">❤️ ${horse.health}</div><div class="sbar-bg"><div class="sbar-fill fill-health" style="width:${pct(horse.health)}%"></div></div></div>
        <button class="btn btn-primary btn-block mt-sm" onclick="G.startBidding(${i})"${G.money<Math.floor(horse.value*.5)?' disabled':''}>🔨 Bid (opens ~${money(Math.floor(horse.value*.6))})</button>
      </div>`;

    return h;

  startBidding(idx){
    let horse=G.auctionHorses[idx];if(!horse)return;
    let cap=RANCH_LEVELS[G.ranchLevel].cap;if(G.horses.filter(h=>!h.retired).length>=cap){G.toast('Ranch full!');return}
    let bidders=generateBidders(horse,horse._auctionTier||1);
    if(G.phase==='first_auction')bidders.forEach(b=>{b.maxBid=Math.min(b.maxBid,Math.floor(G.money*.55)+R(-200,200))});
    let openBid=Math.floor(horse.value*.55);
    G._auction={horse,bidders,currentBid:openBid,playerBid:0,log:[],idx};
    let opener=bidders.find(b=>b.active&&b.maxBid>=openBid);
    if(opener){opener.lastBid=openBid;G._auction.log.push({icon:opener.icon,name:opener.name,amount:openBid})}
    G.renderBidModal();
  },
  renderBidModal(){
    let a=G._auction;if(!a)return;
    let cb=a.currentBid,inc=Math.max(100,Math.floor(cb*.1));
    let b1=cb+inc,b2=cb+inc*2,b3=cb+inc*4;
    let html=`<h2>🔨 ${a.horse.name}</h2>
      <div class="text-center text-xs text-muted">${a.horse.coat} ${a.horse.breed}</div>
      <div style="background:#FFF8E1;border-radius:10px;padding:10px;margin:8px 0;text-align:center">
        <div class="text-xs text-muted">Current Bid</div>
        <div style="font-size:20px;font-weight:bold;color:#B8860B">${money(cb)}</div>
        <div class="text-xs text-muted">${a.bidders.filter(b=>b.active).length} active bidders</div>
      </div>`;
    a.log.slice(-5).forEach(l=>{html+=`<div class="bid-row"><span class="bidder-name">${l.icon} ${l.name}</span><span class="bid-amount">${money(l.amount)}</span></div>`});
    html+=`<div class="mt-md">
      <button class="btn btn-gold btn-block" onclick="G.placeBid(${b1})"${G.money<b1?' disabled':''}>Bid ${money(b1)}</button>
      <button class="btn btn-primary btn-block mt-sm" onclick="G.placeBid(${b2})"${G.money<b2?' disabled':''}>Raise ${money(b2)}</button>
      <button class="btn btn-danger btn-block mt-sm" onclick="G.placeBid(${b3})"${G.money<b3?' disabled':''}>🔥 ${money(b3)}</button>
      <button class="btn btn-ghost btn-block mt-sm" onclick="G._auction=null;G.closeModal()">Walk Away</button>
    </div>`;
    $('modal-content').innerHTML=html;$('modal-bg').classList.add('show');
  },
  placeBid(amount){
    let a=G._auction;if(!a)return;
    a.playerBid=amount;a.currentBid=amount;a.log.push({icon:'🫵',name:'You',amount});
    let responded=false;
    for(let b of a.bidders){
      if(!b.active)continue;
      if(b.maxBid>amount+R(0,300)){
        let nb=amount+Math.max(100,Math.floor(amount*.1))+R(0,200);
        if(nb>b.maxBid){b.active=false;continue}
        b.lastBid=nb;a.currentBid=nb;a.log.push({icon:b.icon,name:b.name,amount:nb});responded=true;break;
      }else b.active=false;
    }
    if(!responded){
      G.money-=a.playerBid;let horse=a.horse;horse.purchaseYear=G.year;G.horses.push(horse);G.auctionHorses.splice(a.idx,1);
      G.addEvent(`🔨 Won ${horse.name} (${horse.coat}) for ${money(a.playerBid)}!`,'auction');
      if(G.phase==='first_auction'){G.phase='playing';G.addEvent('🌅 Welcome to '+G.ranchName+'!','neutral')}
      if(G.tutStage==='tut_buy'){G.tutStage='tut_train';G._tutHorseId=horse.id;}
      G.auctionHorses.push(makeHorse({age:R(2,7)}));
      G._auction=null;G.closeModal();G.toast(`🎉 ${horse.name} is yours!`);G.updateUI();G.tab('horses');
    }else G.renderBidModal();
  },

  // ===== SELL CONFIRM + ANIMATED AUCTION =====
  confirmSell(id){
    let h=G.horses.find(x=>x.id===id);if(!h)return;
    $('modal-content').innerHTML=`<h2>🔨 Sell ${h.name}?</h2>
      <div class="text-center text-sm text-muted">${h.coat} ${h.breed} · ${h.tempName}</div>
      <div class="grid-2 mt-sm">
        <div style="background:#FFF8E1;border-radius:8px;padding:8px;text-align:center"><div class="text-xs text-muted">Speed</div><strong>${h.speed}</strong></div>
        <div style="background:#FFF8E1;border-radius:8px;padding:8px;text-align:center"><div class="text-xs text-muted">Value</div><strong class="money">${money(h.value)}</strong></div>
      </div>
      <p class="text-sm text-muted text-center mt-sm">This will list ${h.name} at auction. Bidders will compete. You cannot undo this.</p>
      <button class="btn btn-danger btn-block mt-md" onclick="G.runSellAuction(${h.id})">Confirm — Sell at Auction</button>
      <button class="btn btn-ghost btn-block mt-sm" onclick="G.closeModal()">Cancel</button>`;
    $('modal-bg').classList.add('show');
  },

  runSellAuction(id){
    let h=G.horses.find(x=>x.id===id);if(!h)return;
    // Always exactly 2 distinct bidders for player horse auctions
    let pool=[...BIDDER_TYPES].sort(()=>Math.random()-.5);
    let mkBidder=t=>{
      let b={...t};let interest=1;
      if(b.pref==='rarecoat'&&['Cremello','Perlino','Palomino','Leopard','Tobiano'].some(c=>h.coat.includes(c)))interest+=.8;
      if(b.pref==='speed'&&h.speed>=70)interest+=.5;
      if(b.pref==='genes'&&(h.tested||expressedSpecials(h).length))interest+=.6;
      if(b.pref==='random')interest+=Math.random()*.6;
      b.maxBid=Math.floor(h.value*b.maxMult*Math.max(.3,interest)*(.8+Math.random()*.4));
      b.lastBid=0;b.active=true;return b;
    };
    let bA=mkBidder(pool[0]),bB=mkBidder(pool[1]);
    let open=Math.floor(h.value*.42);
    let minRaise=Math.max(100,Math.floor(open*.08));
    // Guarantee both can open and respond at least once
    if(bA.maxBid<open)bA.maxBid=open+R(100,400);
    if(bB.maxBid<open+minRaise)bB.maxBid=open+minRaise+R(100,400);
    // Pre-calculate bid sequence: A opens, then strictly alternates B/A
    let log=[];let cur=open;
    bA.lastBid=cur;log.push({icon:bA.icon,name:bA.name,amount:cur});
    let turn=1; // 1=bB next
    for(let round=0;round<8;round++){
      let b=turn===0?bA:bB;turn=1-turn;
      if(!b.active)continue;
      let inc=Math.max(100,Math.floor(cur*.08))+R(50,220);
      let nb=cur+inc;
      if(nb>b.maxBid){b.active=false;continue}
      cur=nb;b.lastBid=nb;log.push({icon:b.icon,name:b.name,amount:nb});
    }
    let final=cur;
    let winner=log.length?log[log.length-1]:null;
    if(!winner||final<h.value*.3){G.closeModal();G.toast(h.name+' — no acceptable bid.');return}
    // Anti-flip cap
    let flipCapped=false;
    if(h.purchaseYear!=null&&(G.year-h.purchaseYear)<3){
      let cap=Math.floor(h.value*.5);if(final>cap){final=cap;flipCapped=true;}
    }
    // Commit sale immediately to prevent double-sell
    G.money+=final;G.horses=G.horses.filter(x=>x.id!==h.id);
    G.addEvent(`🔨 Sold ${h.name} for ${money(final)} to ${winner.icon} ${winner.name}!`,'auction');
    G.updateUI();
    // Show live auction sequence
    $('modal-content').innerHTML=`<h2>🔨 ${h.name} — Live Auction</h2>
      <div style="background:#FFF8E1;border-radius:10px;padding:10px 12px;margin:8px 0;text-align:center">
        <div class="text-xs text-muted">Current Bid</div>
        <div id="live-bid" style="font-size:22px;font-weight:bold;color:#B8860B">${money(open)}</div>
        <div id="live-leader" class="text-xs text-muted" style="margin-top:2px">${bA.icon} ${bA.name} leads</div>
      </div>
      <div id="live-log" style="max-height:180px;overflow-y:auto;margin:8px 0"></div>
      <div id="live-sold" style="display:none"></div>
      <button id="live-continue" class="btn btn-primary btn-block mt-md" style="display:none" onclick="G.closeModal();G.tab('horses')">Continue</button>`;
    $('modal-bg').classList.add('show');
    let step=0;
    function nextBid(){
      if(step>=log.length){
        let soldEl=document.getElementById('live-sold');
        if(soldEl){
          soldEl.innerHTML=`<div style="background:#E8F5E9;border-radius:10px;padding:14px;text-align:center">
            <div style="font-size:30px">🎉</div>
            <div style="font-size:17px;font-weight:bold;color:#1B5E20">${money(final)} — SOLD!</div>
            <div class="text-xs text-muted">to ${winner.icon} ${winner.name}</div>
            ${flipCapped?'<div class="text-xs" style="color:#C0392B;margin-top:4px">⚠️ Anti-flip cap applied (held &lt; 3 yrs)</div>':''}
          </div>`;
          soldEl.style.display='block';
        }
        let btn=document.getElementById('live-continue');
        if(btn)btn.style.display='block';
        return;
      }
      let bid=log[step++];
      let logEl=document.getElementById('live-log');
      if(logEl){
        let row=document.createElement('div');
        row.className='bid-row';
        row.innerHTML=`<span class="bidder-name">${bid.icon} ${bid.name}</span><span class="bid-amount">${money(bid.amount)}</span>`;
        logEl.appendChild(row);logEl.scrollTop=logEl.scrollHeight;
      }
      let liveBid=document.getElementById('live-bid');
      let liveLeader=document.getElementById('live-leader');
      if(liveBid)liveBid.textContent=money(bid.amount);
      if(liveLeader)liveLeader.textContent=bid.icon+' '+bid.name+' leads';
      setTimeout(nextBid,680);
    }
    setTimeout(nextBid,350);
  },

  // ===== RACE =====
  renderRace(){
    let raceable=G.horses.filter(h=>h.age>=3&&h.age<=5&&!h.retired&&!h.dead&&h.races<(h.maxRaces||10));
    raceable.sort((a,b)=>(b.favorite?1:0)-(a.favorite?1:0));
    let h='<div class="sec-title">Race Day</div>';
    if(!raceable.length){
      h+=`<div class="empty"><div class="icon">🏇</div>No race-ready horses!<br>Must be age 3–5, not retired, under 10 lifetime races.</div>`;return h;
    }
    h+=`<div class="sec-sub">Pick a Horse</div>`;
    raceable.forEach(horse=>{
      let sel=G._raceHorse===horse.id?' style="border:2px solid #8B4513;background:#FFF8F0"':'';
      let cleared=horse.raceTiersCleared||[];
      let maxOpen=cleared.length>0?Math.max(...cleared)+1:1;
      let tierLabel=maxOpen===1?'T1 open':'T1–T'+maxOpen+' open';
      h+=`<div class="horse-card"${sel} onclick="G._raceHorse=${horse.id};G._raceType=null;G.renderTab()">
        <div class="horse-avatar">${horse.gender==='M'?'🐴':'🐎'}</div>
        <div class="horse-info"><div class="horse-name">${horse.name}${horse.favorite?' ⭐':''}</div>
          <div class="horse-sub">Spd ${horse.speed} · Trn ${horse.trained} · ${tierLabel} · ${(horse.maxRaces||10)-horse.races} races left</div>
        </div>${G._raceHorse===horse.id?'<div style="font-size:18px">✅</div>':''}</div>`;
    });
    let selHorse=G.horses.find(x=>x.id===G._raceHorse);
    h+=`<div class="sec-sub mt-md">Pick a Race</div>`;
    RACES.forEach(r=>{
      let check=canEnterRace(selHorse,r);
      let locked=!check.ok;
      h+=`<div class="card" style="cursor:pointer;opacity:${locked?.4:1};border-radius:12px"
        onclick="${locked?'':`G.raceCardClick('${r.id}')`}">
        <div class="flex-row"><strong>${r.icon} ${r.name}</strong>
          <span class="text-xs" style="color:${locked?'#C0392B':'#8B6A5A'}">${locked?('🔒 '+check.reason):'Tier '+r.tier}</span>
        </div>
        <div class="text-xs text-muted">${r.loc} · ${r.dist}</div>
        <div class="text-xs text-muted mt-sm">Entry: <span class="money">${money(r.fee)}</span> · 1st: <span class="money">${money(r.prizes[0])}</span> · 2nd: ${money(r.prizes[1])}</div>
      </div>`;
    });

    return h;
  },

  raceCardClick(raceId){
    G._raceType=raceId;G.confirmRace();
  },

  confirmRace(){
    let horse=G.horses.find(x=>x.id===G._raceHorse);
    let race=RACES.find(x=>x.id===G._raceType);
    if(!horse||!race){G.toast('Select a horse and race first');return}
    let check=canEnterRace(horse,race);
    if(!check.ok){G.toast(check.reason);return}
    $('modal-content').innerHTML=`<h2>🏁 Confirm Race</h2>
      <div style="background:#FFF8E1;border-radius:10px;padding:12px;margin:8px 0;text-align:center">
        <div style="font-size:28px">${horse.gender==='M'?'🐴':'🐎'}</div>
        <div style="font-weight:bold;font-size:15px;color:#3D1C02">${horse.name}</div>
        <div class="text-xs text-muted">Spd ${horse.speed} · Stm ${horse.stamina} · Hlt ${calcHealth(horse)} · Age ${horse.age}</div>
      </div>
      <div style="background:#E3F2FD;border-radius:10px;padding:12px;margin:8px 0;text-align:center">
        <div style="font-size:22px">${race.icon}</div>
        <div style="font-weight:bold;color:#0D47A1">${race.name}</div>
        <div class="text-xs text-muted">${race.loc} · ${race.dist}</div>
        <div class="text-xs text-muted mt-sm">Entry: <span class="money">${money(race.fee)}</span> · 1st: <span class="money">${money(race.prizes[0])}</span> · 2nd: ${money(race.prizes[1])}</div>
      </div>
      ${G.money<race.fee?`<div class="ev ev-bad text-xs text-center" style="margin:6px 0">Not enough money for entry fee (need ${money(race.fee)})</div>`:''}
      <button class="btn btn-gold btn-block mt-md" onclick="G.closeModal();G.runRace()" ${G.money<race.fee?'disabled':''}>🏁 Enter Race</button>
      <button class="btn btn-ghost btn-block mt-sm" onclick="G.closeModal()">Cancel</button>`;
    $('modal-bg').classList.add('show');
  },

  runRace(){
    let horse=G.horses.find(x=>x.id===G._raceHorse);
    let race=RACES.find(x=>x.id===G._raceType);if(!horse||!race)return;
    if(horse.retired){G.toast('Retired horses cannot race!');return}
    if(horse.age>5){G.toast(horse.name+' is too old to race (max age 5)!');return}
    let check=canEnterRace(horse,race);
    if(!check.ok){G.toast(check.reason);return}
    if(G.money<race.fee){G.toast("Can't afford entry fee!");return}
    G.money-=race.fee;
    G.startRaceMinigame(horse,race);
  },

  startRaceMinigame(horse,race){
    let tier=race.tier;
    let aiNames=[...CHAMP_NAMES].sort(()=>Math.random()-.5).slice(0,9);
    let te=TEMP_EFFECTS[horse.tempName]||{};
    // Tutorial race: opponents capped at player speed, no injury risk
    let isTutRace=G.tutStage==='tut_race'&&horse.id===G._tutHorseId;
    if(isTutRace){
      let tutPlayerSpeed=clamp(effectiveSpeed(horse)*trainMult(horse)+RANCH_LEVELS[G.ranchLevel].raceBonus,1,120);
      let opponents=aiNames.map(name=>({name,effectiveSpeed:clamp(tutPlayerSpeed-R(6,18),10,tutPlayerSpeed-1),trackPos:0}));
      opponents.sort((a,b)=>b.effectiveSpeed-a.effectiveSpeed);
      opponents.forEach((op,i)=>{op.trackPos=6+(8-i)*2+R(-2,2);});
      let mgState={horse,race,te,opponents,playerTrackPos:0,playerPlace:10,
        staminaPool:9999,fatigued:false,totalChecks:0,maxChecks:12,
        done:false,checkLog:[],injuryEvent:null,greenStart:30,greenSize:25,
        _cursorPos:0,_playerSpeed:horse.speed,tutorialRace:true};
      G._mg=mgState;G.updateGreenZone(mgState);G.renderMinigame();return;
    }
    // Opponents use absolute speed ranges (RACE_OPP) — independent of player horse quality.
    // This ensures higher auction-tier horses have genuine, visible advantage in lower races.
    if(tier===10){
      // Derby: opponents are fixed elite speed range (82-96), independent of player
      let opponents10=aiNames.map(name=>{
        let spd=clamp(Math.round(triRand(82,96))+R(-3,3),75,100);
        return{name,effectiveSpeed:spd,trackPos:0};
      });
      opponents10.sort((a,b)=>b.effectiveSpeed-a.effectiveSpeed);
      opponents10.forEach((op,i)=>{op.trackPos=6+(8-i)*2+R(-2,2);});
      let mgState={horse,race,te,opponents:opponents10,playerTrackPos:0,playerPlace:10,
        staminaPool:horse.stamina,fatigued:false,totalChecks:0,maxChecks:12,
        done:false,checkLog:[],injuryEvent:null,greenStart:30,greenSize:25,_cursorPos:0,_playerSpeed:horse.speed};
      G._mg=mgState;G.updateGreenZone(mgState);G.renderMinigame();return;
    }
    let ro=RACE_OPP[tier]||{b:50,v:10};
    let opponents=aiNames.map(name=>{
      let spd=clamp(ro.b+R(-ro.v,ro.v),10,100);
      return{name,effectiveSpeed:spd,trackPos:0};
    });
    // Fastest opponent in 1st (index 0), slowest in 9th (index 8)
    opponents.sort((a,b)=>b.effectiveSpeed-a.effectiveSpeed);
    // Stagger starting positions: 1st place is furthest ahead visually
    opponents.forEach((op,i)=>{op.trackPos=6+(8-i)*2+R(-2,2);});
    let mgState={
      horse,race,te,opponents,
      playerTrackPos:0,playerPlace:10,
      staminaPool:horse.stamina,fatigued:false,
      totalChecks:0,maxChecks:12,
      done:false,checkLog:[],injuryEvent:null,
      greenStart:30,greenSize:25,_cursorPos:0,_playerSpeed:horse.speed,
    };
    G._mg=mgState;
    G.updateGreenZone(mgState);
    G.renderMinigame();
  },

  updateGreenZone(mg){
    let h=mg.horse,r=mg.race,te=mg.te;
    let fatigueMult=mg.fatigued?(te.fatigueMult||0.65):1.0;
    let rb=RANCH_LEVELS[G.ranchLevel].raceBonus;
    let champBonus=(expressedSpecials(h).includes('champion')&&r.tier>=8)?5:0;
    let playerSpeed=clamp(effectiveSpeed(h)*trainMult(h)*fatigueMult+rb+champBonus,1,120);
    let targetIdx=mg.playerPlace-2;
    let targetSpeed=(targetIdx>=0&&targetIdx<mg.opponents.length)?mg.opponents[targetIdx].effectiveSpeed:playerSpeed;
    let tempMod=(te.greenBonus||0)*0.25;
    let fatigueMod=mg.fatigued?-8:0;
    let tierPenalty=(r.tier-1)*0.8;
    let gs=clamp(12+1.8*(playerSpeed-targetSpeed)+tempMod+fatigueMod-tierPenalty,8,45);
    let gStart=R(5,Math.max(6,Math.floor(95-gs)));
    mg.greenSize=gs;mg.greenStart=gStart;mg._playerSpeed=playerSpeed;
  },

  renderMinigame(){
    let mg=G._mg;if(!mg)return;
    let h=mg.horse,r=mg.race;
    G.updateGreenZone(mg);
    let playerSpeed=mg._playerSpeed||h.speed;
    let targetIdx=mg.playerPlace-2;
    let canOvertake=false,targetSpeed=0,targetName='';
    if(!mg.done&&targetIdx>=0&&targetIdx<mg.opponents.length){
      targetSpeed=mg.opponents[targetIdx].effectiveSpeed;
      targetName=mg.opponents[targetIdx].name.split(' ')[0];
      canOvertake=targetSpeed<=playerSpeed;
    }

    // Build track display rows
    let displayRows;
    if(mg._runoutOrder){
      // Auto-finish: lane order is locked; only horizontal position (lp) updates
      displayRows=mg._runoutOrder.map(entry=>({
        label:entry.label,
        pos:entry.isPlayer?mg.playerTrackPos:mg.opponents[entry.opIdx].trackPos,
        isPlayer:entry.isPlayer,
        isTarget:false
      }));
    }else{
      // Manual phase: sort by position so leader is on top
      displayRows=mg.opponents.map((op,i)=>({
        label:op.name.split(' ')[0],pos:op.trackPos,isPlayer:false,
        isTarget:(!mg.done&&i===targetIdx)
      }));
      displayRows.push({label:h.name.split(' ')[0],pos:mg.playerTrackPos,isPlayer:true,isTarget:false});
      displayRows.sort((a,b)=>b.pos-a.pos);
    }

    let trackHtml='<div class="race-track" style="padding:5px 8px;margin:6px 0">';
    displayRows.forEach((t,i)=>{
      let lp=(t.pos/100)*88; // 100 = finish line = right edge of track
      let col=t.isPlayer?'#D4A017':t.isTarget?'#E74C3C':'#C4A882';
      let bg=t.isPlayer?'rgba(212,160,23,0.18)':t.isTarget?'rgba(231,76,60,0.12)':'';
      trackHtml+=`<div class="race-lane" style="height:18px;margin:2px 0;${bg?'background:'+bg+';border-radius:3px':''}">
        <div class="race-lane-label" style="color:${col};width:68px;font-size:8px">${i+1}. ${t.label}${t.isPlayer?' ◀':t.isTarget?' ↑':''}</div>
        <div class="race-lane-bg"><div class="race-runner" style="left:${lp}%;font-size:15px">${t.isPlayer?'🏇':'🐴'}</div></div>
      </div>`;
    });
    trackHtml+='</div>';

    let staminaPct=Math.round(mg.staminaPool/Math.max(1,h.stamina)*100);
    let dots=mg.checkLog.map(z=>`<div class="mg-dot ${z}"></div>`).join('');
    let emptyCount=mg.maxChecks-mg.checkLog.length;
    for(let i=0;i<Math.min(emptyCount,mg.maxChecks);i++)dots+=`<div class="mg-dot"></div>`;

    let html=`<h2 style="margin-bottom:2px">${r.icon} ${r.name}</h2>
      <div class="text-center text-xs text-muted">Place: <strong style="color:#D4A017">${mg.playerPlace}/10</strong> · Attempt ${mg.totalChecks+1}/${mg.maxChecks}</div>
      <div class="flex-row mt-sm" style="font-size:11px;padding:0 2px">
        <span>⚡ <strong>${Math.round(playerSpeed)}</strong></span>
        <span>💪 ${mg.fatigued?'<span style="color:#C0392B">FATIGUED</span>':staminaPct+'%'}</span>
        <span>${targetIdx>=0&&!mg.done?'🎯 '+targetName+' ('+Math.round(targetSpeed)+')':'🥇 In lead!'}</span>
      </div>
      ${trackHtml}`;

    if(!mg.done){
      if(mg._autoFinishing){
        html+=`<div class="ev ev-neutral text-xs text-center" style="margin:6px 0;padding:8px">🏁 Final stretch...</div>`;
      }else if(mg.playerPlace>1){
        if(canOvertake&&mg.totalChecks<mg.maxChecks){
          html+=`<div class="text-xs text-muted text-center" style="margin:3px 0">🟢 Tap to overtake <strong>${targetName}</strong> · green ${Math.round(mg.greenSize)}%</div>
            <div style="position:relative;margin:4px 0">
              <div class="mg-track" id="mg-track" onclick="G.doRaceCheck()" style="background:#C0392B">
                <div style="position:absolute;left:${mg.greenStart.toFixed(1)}%;top:0;height:100%;width:${mg.greenSize.toFixed(1)}%;background:linear-gradient(90deg,#27AE60,#2ECC71);border-radius:2px;z-index:1"></div>
                <div class="mg-cursor" id="mg-cursor" style="left:0%;z-index:2"></div>
              </div>
            </div>`;
        }else{
          html+=`<div class="ev ev-neutral text-xs text-center" style="margin:6px 0;padding:8px">🏇 Running to finish...</div>`;
        }
      }else{
        html+=`<div class="ev ev-good text-xs text-center" style="margin:6px 0">🥇 You're in the lead!</div>`;
      }
    }

    html+=`<div class="mg-check-row" style="margin:4px 0">${dots}</div>`;
    if(!mg.done){
      if(!mg._autoFinishing&&canOvertake&&mg.playerPlace>1&&mg.totalChecks<mg.maxChecks){
        html+=`<button class="btn btn-gold btn-block" id="mg-btn" onclick="G.doRaceCheck()">⏱ TIME IT!</button>`;
      }
    }else{
      html+=`<div class="ev ev-good text-xs text-center" style="margin:6px 0;padding:8px">🏁 Race finished!</div>`;
      if(!G._finishTimer)G._finishTimer=setTimeout(()=>G.finishRace(),900);
    }
    $('modal-content').innerHTML=html;
    $('modal-bg').classList.add('show');
    let canStillOvertake=!mg.done&&canOvertake&&mg.playerPlace>1&&mg.totalChecks<mg.maxChecks&&!mg._autoFinishing;
    let shouldRunout=!mg.done&&!mg._autoFinishing&&(mg.playerPlace<=1||mg.totalChecks>=mg.maxChecks||(!canOvertake&&mg.playerPlace>1));
    if(canStillOvertake)G.startCursor();
    if(shouldRunout)G.startAutoFinish();
  },

  startCursor(){
    if(G._cursorAnim)clearInterval(G._cursorAnim);
    let pos=0,dir=1,speed=1.5;
    G._cursorAnim=setInterval(()=>{
      let el=$('mg-cursor');if(!el){clearInterval(G._cursorAnim);return}
      pos+=dir*speed;
      if(pos>=99){pos=99;dir=-1}
      if(pos<=0){pos=0;dir=1}
      el.style.left=pos+'%';
      if(G._mg)G._mg._cursorPos=pos;
    },16);
  },

  doRaceCheck(){
    let mg=G._mg;if(!mg||mg.done)return;
    if(G._cursorAnim){clearInterval(G._cursorAnim);G._cursorAnim=null;}
    // Capture cursor position and visible zone BEFORE updateGreenZone randomizes them
    let capturedPos=mg._cursorPos||0;
    let capturedGreenStart=mg.greenStart;
    let capturedGreenEnd=mg.greenStart+mg.greenSize;
    let h=mg.horse,r=mg.race,te=mg.te;
    let playerSpeed=mg._playerSpeed||h.speed;
    let targetIdx=mg.playerPlace-2;
    let targetSpeed=(targetIdx>=0&&targetIdx<mg.opponents.length)?mg.opponents[targetIdx].effectiveSpeed:0;
    let canOvertake=targetIdx>=0&&targetSpeed<=playerSpeed&&mg.playerPlace>1;
    let hitGreen=false;

    if(canOvertake){
      hitGreen=(capturedPos>=capturedGreenStart&&capturedPos<=capturedGreenEnd);
      if(hitGreen){
        mg.checkLog.push('green');
        // Move player ahead of target: set trackPos just past them
        mg.playerTrackPos=Math.max(mg.playerTrackPos,mg.opponents[targetIdx].trackPos+2);
        mg.playerPlace=Math.max(1,mg.playerPlace-1);
        // Tiny injury risk on successful push
        if(!mg.tutorialRace&&Math.random()<0.01&&!expressedSpecials(h).includes('iron')){
          let strainSev=R(1,3);
          h.conditions.push({name:'Race Strain',type:'injury',severity:strainSev,yearsUntreated:0,treatedThisYear:false});
          if(!mg.injuryEvent)mg.injuryEvent='injured';
        }
      }else{
        mg.checkLog.push('red');
        // Momentum penalty
        mg.playerTrackPos=Math.max(0,mg.playerTrackPos-2);
        let injRisk=mg.tutorialRace?0:(te.redInjury!==undefined?te.redInjury:0.04)+(r.tier-1)*0.005+(h.permInjChance||0);
        let hlth=calcHealth(h);
        if(!mg.tutorialRace&&hlth<50)injRisk+=0.02;
        if(expressedSpecials(h).includes('iron'))injRisk=Math.max(0,injRisk-0.04);
        if(expressedSpecials(h).includes('lightning'))injRisk+=0.02;
        if(Math.random()<injRisk){
          let sev=R(1,9);
          if(sev>=9&&r.tier>=8){h.dead=true;h.deathCause='race injury';h.deathYear=G.year;mg.injuryEvent='fatal';}
          else{h.conditions.push({name:'Race Injury',type:'injury',severity:sev,yearsUntreated:0,treatedThisYear:false});h.maxRaces=Math.max(0,(h.maxRaces||10)-sev);if(!mg.injuryEvent)mg.injuryEvent='injured';}
        }
      }
    }
    // (hold-pace: no checkLog entry, no injury — just advance)

    // Stamina drain scales with tier
    const tierDrains=[0,2,3,6,7,8,9,10,11,12,14];
    let drain=(tierDrains[r.tier]||6)+(te.staminaDrain||0);
    mg.staminaPool=Math.max(0,mg.staminaPool-drain);
    if(mg.staminaPool<=0&&!mg.fatigued)mg.fatigued=true;

    // Advance track positions
    let advBase=8;
    mg.opponents.forEach(op=>{
      op.trackPos=Math.min(100,op.trackPos+advBase+(op.effectiveSpeed-50)*0.12+R(-2,2));
    });
    let fatMult=mg.fatigued?(te.fatigueMult||0.65):1.0;
    let playerAdv=advBase+(playerSpeed-50)*0.12+R(-2,2);
    if(canOvertake&&!hitGreen)playerAdv*=0.75; // momentum loss on miss
    mg.playerTrackPos=Math.min(100,mg.playerTrackPos+playerAdv);

    mg.totalChecks++;

    if(mg.injuryEvent==='fatal')mg.done=true;

    if(!mg.done&&!mg._autoFinishing)G.updateGreenZone(mg);
    G.renderMinigame();
  },

  startAutoFinish(){
    let mg=G._mg;if(!mg||mg.done||mg._autoFinishing)return;
    // Snapshot current player speed before we touch anything
    G.updateGreenZone(mg);
    mg._autoFinishing=true;
    // Stagger all 10 horses preserving relative order from current positions
    let allHorses=[
      ...mg.opponents.map(op=>({op,pos:op.trackPos,isPlayer:false})),
      {op:null,pos:mg.playerTrackPos,isPlayer:true}
    ];
    allHorses.sort((a,b)=>b.pos-a.pos);
    allHorses.forEach((entry,i)=>{
      let startPos=55-i*5; // 1st→55, 2nd→50, ..., 10th→10
      if(entry.isPlayer)mg.playerTrackPos=startPos;
      else entry.op.trackPos=startPos;
    });
    // Compute base arrival steps from real performance: faster/fitter = earlier arrival
    // _playerSpeed already has fatigue baked in via updateGreenZone; opponents use effectiveSpeed
    let baseArrivals=allHorses.map(entry=>{
      let pace=entry.isPlayer?mg._playerSpeed:entry.op.effectiveSpeed;
      return Math.round(8+Math.max(0,100-pace)*0.2); // pace 100→step 8, pace 10→step 26
    });
    // Constraint pass: rank i must arrive at least 1 step after rank i-1 (lock order)
    let arrivals=[];
    baseArrivals.forEach((base,i)=>arrivals.push(i===0?base:Math.max(arrivals[i-1]+1,base)));
    // Lock lane order with perf-derived arrival times
    mg._runoutOrder=allHorses.map((entry,i)=>({
      label:(entry.isPlayer?mg.horse:entry.op).name.split(' ')[0],
      isPlayer:entry.isPlayer,
      opIdx:entry.isPlayer?-1:mg.opponents.indexOf(entry.op),
      startPos:55-i*5,
      arrivalStep:arrivals[i]
    }));
    mg._runoutSteps=0;
    G.renderMinigame(); // show initial staggered positions immediately
    G._autoFinishTimer=setTimeout(()=>G.autoFinishStep(),80);
  },

  autoFinishStep(){
    let mg=G._mg;if(!mg||mg.done){G._autoFinishTimer=null;return;}
    let step=mg._runoutSteps;
    let allArrived=true;
    mg._runoutOrder.forEach(entry=>{
      let progress=Math.min(1,step/entry.arrivalStep);
      let pos=entry.startPos+(100-entry.startPos)*progress;
      if(entry.isPlayer)mg.playerTrackPos=pos;
      else mg.opponents[entry.opIdx].trackPos=pos;
      if(pos<100)allArrived=false;
    });
    mg._runoutSteps=step+1;
    if(allArrived||mg._runoutSteps>200)mg.done=true;
    G._autoFinishTimer=mg.done?null:setTimeout(()=>G.autoFinishStep(),80);
    G.renderMinigame();
  },

  finishRace(){
    let mg=G._mg;if(!mg)return;
    if(G._cursorAnim){clearInterval(G._cursorAnim);G._cursorAnim=null;}
    if(G._autoFinishTimer){clearTimeout(G._autoFinishTimer);G._autoFinishTimer=null;}
    if(G._finishTimer){clearTimeout(G._finishTimer);G._finishTimer=null;}
    let horse=mg.horse,race=mg.race;
    let place=mg.playerPlace;
    if(G.tutStage==='tut_race'&&horse.id===G._tutHorseId)G.tutStage='tut_breed';
    if(expressedSpecials(horse).includes('truegrit')&&place>3)place=3;
    let prize=race.prizes[place-1]||0;
    if(prize>0){G.money+=prize;G.legacy.totalEarnings=(G.legacy.totalEarnings||0)+prize;}
    // Clear this tier on podium
    if(place<=3){
      horse.raceTiersCleared=horse.raceTiersCleared||[];
      if(!horse.raceTiersCleared.includes(race.tier))horse.raceTiersCleared.push(race.tier);
    }
    // Trophies + medals
    let trRow=RACE_TROPHIES[race.tier]||[0,0,0];
    if(place<=3){
      let trAmt=trRow[place-1]||0;
      horse.trophies=(horse.trophies||0)+trAmt;
      G.legacy.trophies=(G.legacy.trophies||0)+trAmt;
      let isDerby=race.tier===10;
      if(place===1){
        if(isDerby){horse.medals.derbyGold++;G.legacy.medals.derbyGold++;}
        else{horse.medals.gold++;G.legacy.medals.gold++;}
      }else if(place===2){
        if(isDerby){horse.medals.derbySilver++;G.legacy.medals.derbySilver++;}
        else{horse.medals.silver++;G.legacy.medals.silver++;}
      }else{
        if(isDerby){horse.medals.derbyBronze++;G.legacy.medals.derbyBronze++;}
        else{horse.medals.bronze++;G.legacy.medals.bronze++;}
      }
    }
    if(place===1){
      horse.wins++;G.reputation=Math.min(100,G.reputation+R(3,8));
      G.legacy.wins.push({year:G.year,horse:horse.name,race:race.name,prize});
      if(race.tier===10)G.legacy.champWins.push({year:G.year,horse:horse.name});
    }
    if(place===2)G.reputation=Math.min(100,G.reputation+R(1,4));
    if(place<=3)horse.value=Math.floor(horse.value*1.15);
    if(race.tier===10)horse.derbyEntered=true;
    horse.races++;
    if(horse.races>=3)horse.discovered.expression=true;
    const placeEmojis=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
    const placeTexts=['1st Place!','2nd Place!','3rd Place!','4th Place','5th Place','6th Place','7th Place','8th Place','9th Place','10th Place'];
    let placeEmoji=placeEmojis[Math.min(place-1,9)];
    let placeText=placeTexts[Math.min(place-1,9)];
    let bg=place===1?'#FFF8E1':place===2?'#F3E5F5':place===3?'#E8F5E9':'#FFEBEE';
    let resultHtml;
    if(mg.injuryEvent==='fatal'){
      G.horses=G.horses.filter(x=>x.id!==horse.id);
      G.addEvent(`💔 ${horse.name} suffered a fatal injury at ${race.name}.`,'death');
      resultHtml=`<div style="background:#FFEBEE;border-radius:12px;padding:18px;text-align:center">
        <div style="font-size:40px">💔</div>
        <div style="font-size:16px;font-weight:bold;color:#7F0000">${horse.name} broke a leg.</div>
      </div>`;
    }else{
      let tierMsg=place<=3?`<div class="text-xs" style="color:#27AE60;margin-top:4px">✅ Tier ${race.tier} cleared${race.tier<10?' — Tier '+(race.tier+1)+' unlocked!':'!'}</div>`:'';
      let injNote=mg.injuryEvent==='injured'?'<div class="text-xs" style="color:#C0392B;margin-top:4px">⚠️ Injured during race!</div>':'';
      let derbyNote=race.tier===10?`<div class="text-xs text-muted mt-sm">This was ${horse.name}'s one Kentucky Derby entry.</div>`:'';
      let overtakes=mg.checkLog.filter(c=>c==='green').length;
      let misses=mg.checkLog.filter(c=>c==='red').length;
      let trRow=RACE_TROPHIES[race.tier]||[0,0,0];
      let trEarned=place<=3?(trRow[place-1]||0):0;
      resultHtml=`<div style="background:${bg};border-radius:12px;padding:18px;text-align:center">
        <div style="font-size:44px">${placeEmoji}</div>
        <div style="font-size:18px;font-weight:bold;color:#3D1C02">${placeText}</div>
        <div class="text-sm text-muted">${horse.name} at ${race.name}</div>
        ${prize?'<div class="money" style="font-size:16px;margin-top:4px">+'+money(prize)+'</div>':''}
        ${trEarned?`<div class="text-xs" style="color:#8B6914;margin-top:4px">+${trEarned} trophies 🏅</div>`:''}
        ${tierMsg}${injNote}${derbyNote}
      </div>
      <div class="text-xs text-muted mt-sm text-center">Overtakes: ${overtakes} · Missed: ${misses}</div>`;
      G.addEvent(`🏁 ${horse.name} — ${placeText} at ${race.name}${prize?' (+'+money(prize)+')':''}${mg.injuryEvent==='injured'?' (injured!)':''}`,place<=3?'race':'neutral');
    }
    $('modal-content').innerHTML=resultHtml+`<button class="btn btn-primary btn-block mt-sm" onclick="G._mg=null;G.closeModal();G.renderTab()">Continue</button>`;
    refreshStats(horse);G.updateUI();
    G._mg=null;
  },

  // ===== RANCH + BREEDING WITH STATS =====

        '<span class="text-xs text-muted">🔒</span>'}</div>
        <div class="text-xs text-muted mt-sm">Cap ${nl.cap} · Race +${nl.raceBonus} · Breed +${nl.breedBonus}</div></div>`;
    }
    // Pregnancies
    if(G.pregnancies.length){
      h+=`<div class="sec-title mt-md">🤰 Expecting</div>`;

        let yl=p.dueYear-G.year;
        h+=`<div class="card" style="border-left:4px solid #E91E63"><div class="flex-row">
          <div><strong>${p.damName}</strong> × ${p.sireName}</div>
          <span class="tag" style="background:#FCE4EC;color:#880E4F">${yl<=0?'Due now!':'Due in '+yl+' yr'}</span>

          <div class="flex-row"><div><strong>${r.name}</strong> <span class="tag" style="background:#E0E0E0;color:#424242">🏡</span></div>
            <span class="text-xs text-muted">Age ${r.age} · 🏆 ${r.wins}W</span>
          </div>
          <div class="text-xs text-muted">${r.coat} ${r.breed}</div>
        </div>`;
      });

    h+=`<div class="sec-title mt-md">🌸 Breeding</div>`;

    let pregIds=G.pregnancies.map(p=>p.damId);
    let females=G.horses.filter(x=>x.gender==='F'&&x.age>=4&&!pregIds.includes(x.id)&&!x.retired&&!x.menopausal);
    if(!males.length||!females.length){
      h+=`<div class="card text-center text-sm text-muted">${!males.length?'No stallions (age 2+).':'No mares age 4+ available.'}</div>`;
    }else if(activeCount+G.pregnancies.length>=lvl.cap){
      h+=`<div class="card text-center text-sm" style="color:#C0392B">At capacity!</div>`;
    }else{
      h+=`<div class="card text-xs text-muted">$500 vet fee · 1 year gestation · ~5% twins (risky) · 1% chance of special gene mutation</div>
        <div class="grid-2 mt-sm">
          <div><div class="text-xs" style="font-weight:bold;color:#1565C0">♂ Sire</div>
            <select id="sel-sire" onchange="G.updateBreedPreview()">${males.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></div>
          <div><div class="text-xs" style="font-weight:bold;color:#880E4F">♀ Dam</div>
            <select id="sel-dam" onchange="G.updateBreedPreview()">${females.map(f=>`<option value="${f.id}">${f.name}</option>`).join('')}</select></div>
        </div>
        <div id="breed-preview" class="mt-sm"></div>
        <button class="btn btn-green btn-block mt-sm" onclick="G.breed()">🌸 Breed ($500)</button>
        <div id="inbreed-warn" class="text-xs mt-sm text-center" style="color:#C0392B"></div>`;
      setTimeout(()=>G.updateBreedPreview(),30);
