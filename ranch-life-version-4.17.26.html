  updateBreedPreview(){
    let ss=$('sel-sire'),sd=$('sel-dam'),prev=$('breed-preview'),warn=$('inbreed-warn');
    if(!ss||!sd||!prev)return;
    let sire=G.horses.find(x=>x.id===+ss.value),dam=G.horses.find(x=>x.id===+sd.value);
    if(!sire||!dam)return;
    let coeff=calcInbreeding(sire.id,dam.id,allHorses);
    prev.innerHTML=`<div class="grid-2">
      <div class="card" style="padding:8px;margin:0"><div class="text-xs" style="font-weight:bold;color:#1565C0">♂ ${sire.name}</div>
        <div class="sbar"><div class="sbar-label">⚡ ${sire.speed}</div><div class="sbar-bg"><div class="sbar-fill fill-speed" style="width:${pct(sire.speed)}%"></div></div></div>
        <div class="sbar"><div class="sbar-label">💪 ${sire.stamina}</div><div class="sbar-bg"><div class="sbar-fill fill-stamina" style="width:${pct(sire.stamina)}%"></div></div></div>
        <div class="sbar"><div class="sbar-label">❤️ ${sire.health}</div><div class="sbar-bg"><div class="sbar-fill fill-health" style="width:${pct(sire.health)}%"></div></div></div>
        <div class="text-xs text-muted mt-sm">${sire.tempName} · ${sire.coat}</div>
        ${sire.tested?'<div class="text-xs text-muted">Sp:'+sire.genes.Sp.join('/')+' St:'+sire.genes.St.join('/')+' Hh:'+sire.genes.Hh.join('/')+' Tr:'+sire.genes.Tr.join('/')+'</div>':'<div class="text-xs text-muted" style="color:#C0392B">Untested</div>'}
      </div>
      <div class="card" style="padding:8px;margin:0"><div class="text-xs" style="font-weight:bold;color:#880E4F">♀ ${dam.name}</div>
        <div class="sbar"><div class="sbar-label">⚡ ${dam.speed}</div><div class="sbar-bg"><div class="sbar-fill fill-speed" style="width:${pct(dam.speed)}%"></div></div></div>
        <div class="sbar"><div class="sbar-label">💪 ${dam.stamina}</div><div class="sbar-bg"><div class="sbar-fill fill-stamina" style="width:${pct(dam.stamina)}%"></div></div></div>
        <div class="sbar"><div class="sbar-label">❤️ ${dam.health}</div><div class="sbar-bg"><div class="sbar-fill fill-health" style="width:${pct(dam.health)}%"></div></div></div>
        <div class="text-xs text-muted mt-sm">${dam.tempName} · ${dam.coat}</div>
        ${dam.tested?'<div class="text-xs text-muted">Sp:'+dam.genes.Sp.join('/')+' St:'+dam.genes.St.join('/')+' Hh:'+dam.genes.Hh.join('/')+' Tr:'+dam.genes.Tr.join('/')+'</div>':'<div class="text-xs text-muted" style="color:#C0392B">Untested</div>'}
      </div>
    </div>`;
    if(warn){
      if(coeff>.06)warn.innerHTML='⚠️ '+inbreedLabel(coeff)+' ('+(coeff*100).toFixed(1)+'%)';
      else if(coeff>.03)warn.innerHTML='ℹ️ Line-bred ('+(coeff*100).toFixed(1)+'%)';
      else warn.innerHTML='✅ Outcross';
    }
  },

  treatCondition(horseId,condIdx){
    let h=G.horses.find(x=>x.id===horseId);if(!h)return;
    let cond=h.conditions[condIdx];if(!cond)return;
    let health=calcHealth(h);
    let m=100-health;
    let cost=Math.round(120+10*m+0.4*m*m);
    if(G.money<cost){G.toast(`Need ${money(cost)}!`);return}
    G.money-=cost;
    let severity=cond.severity;
    // Remove condition from active list
    h.conditions.splice(condIdx,1);
    // Restore health
    let restored=Math.round(10+0.32*m);
    h.healPool=(h.healPool||0)+restored;
    // Race Strain: convert to a permanent scar that carries the race-count penalty.
    // Penalty = severity (sev 1→-1 race, sev 2→-2, sev 3→-3).
    // Scar record persists after the active condition is gone.
    if(cond.name==='Race Strain'){
      let penalty=cond.severity;
      h.scars=h.scars||[];
      h.scars.push({name:'Race Strain Scar',type:'strain',severity:cond.severity,racePenalty:penalty,year:G.year});
      h.maxRaces=Math.max(0,(h.maxRaces||10)-penalty);
    }
    if(cond.name==='Race Injury'){
      // Penalty was already applied at injury time; record the event so it's visible
      h.scars=h.scars||[];
      h.scars.push({name:'Race Injury Scar',type:'injury',severity:cond.severity,racePenalty:cond.severity,note:'applied at injury',year:G.year});
    }
    // Permanent aftereffects (injuries only)
    if(cond.type==='injury'){
      if(severity>=10){
        h.dead=true;h.deathCause='catastrophic injury';h.deathYear=G.year;
        G.horses=G.horses.filter(x=>x.id!==h.id);
        G.addEvent(`💔 ${h.name} did not survive treatment of a catastrophic injury.`,'death');
        refreshStats(h);G.closeModal();G.updateUI();G.renderTab();
        G.toast(`💔 ${h.name} did not survive.`);return;
      }
      let aeChance=severity>=7?0.70:severity>=4?0.35:0;
      let aePool=severity>=7?AFTEREFFECTS_MODERATE:AFTEREFFECTS_MINOR;
      if(aeChance>0&&Math.random()<aeChance){
        let ae=pick(aePool);
        applyAftereffect(h,ae);
        G.addEvent(`⚕️ ${h.name} recovered from ${cond.name} — permanent effect: ${ae.desc}`,'bad');
      }
    }
    refreshStats(h);G.toast(`${h.name} treated! -${money(cost)}`);
    G.showHorseDetail(horseId);G.updateUI();
  },

  retireHorse(id){
    let h=G.horses.find(x=>x.id===id);if(!h)return;
    const TUT_ACTIVE=['tut_buy','tut_train','tut_race','tut_breed','tut_waiting'];
    if(TUT_ACTIVE.includes(G.tutStage)){
      if(G.starterMare&&id===G.starterMare.id){G.toast(`${h.name} is needed for the breeding tutorial!`);return;}
      if(G._tutHorseId&&id===G._tutHorseId){G.toast(`${h.name} is needed for the breeding tutorial!`);return;}
    }
    h.retired=true;
    G.horses=G.horses.filter(x=>x.id!==id);
    G.retired.push(h);
    G.addEvent(`🏡 ${h.name} has been retired to pasture.`,'neutral');
    G.toast(`${h.name} retired!`);G.closeModal();G.updateUI();G.renderTab();
  },

  breed(){
    let ss=$('sel-sire'),sd=$('sel-dam');if(!ss||!sd)return;
    let sire=G.horses.find(x=>x.id===+ss.value),dam=G.horses.find(x=>x.id===+sd.value);
    if(!sire||!dam)return;if(G.money<500){G.toast('Need $500!');return}
    if(dam.age<4){G.toast(dam.name+' is too young to breed (min age 4)!');return}
    if(dam.menopausal){G.toast(dam.name+' is menopausal — cannot breed!');return}
    if(dam.retired||sire.retired){G.toast('Cannot breed retired horses!');return}
    if(G.pregnancies.some(p=>p.damId===dam.id)){G.toast(dam.name+' already pregnant!');return}
    let cap=RANCH_LEVELS[G.ranchLevel].cap;
    let activeCount2=G.horses.filter(h=>!h.retired).length;
    if(activeCount2+G.pregnancies.length>=cap){G.toast('At capacity!');return}
    // Tutorial early-breed handling: before tut_breed is reached
    const PRE_BREED=['tut_train','tut_race'];
    if(PRE_BREED.includes(G.tutStage)){
      if(G._tutHorseId&&sire.id===G._tutHorseId&&G.starterMare&&dam.id===G.starterMare.id){
        G.tutStage='tut_breed'; // correct pair used early — count it
      } else if(G.starterMare&&dam.id===G.starterMare.id){
        G.toast(`Save ${dam.name} for the breeding tutorial!`);return;
      }
    }
    let isTutBreed=G.tutStage==='tut_breed';
    G.money-=500;let twins=isTutBreed?false:Math.random()<.05;
    G.pregnancies.push({sireId:sire.id,damId:dam.id,sireName:sire.name,damName:dam.name,dueYear:G.year+1,twins});
    G.addEvent(`🤰 ${dam.name} is pregnant by ${sire.name}! Due next year.${twins?' 🎀 Twins suspected!':''}`,twins?'good':'neutral');
    if(isTutBreed){G.tutStage='tut_waiting';G._tutorialBreeding=true;G.toast(`🤰 ${dam.name} expecting! Tap Next Year to wait for the foal.`);}
    else G.toast(`🤰 ${dam.name} expecting!`);
    G.updateUI();G.renderTab();
  },

  deliverFoals(){
    let due=G.pregnancies.filter(p=>p.dueYear<=G.year);
    G.pregnancies=G.pregnancies.filter(p=>p.dueYear>G.year);
    due.forEach(p=>{
      try{
      let sire=allHorses.find(x=>x.id===p.sireId),dam=G.horses.find(x=>x.id===p.damId);
      if(!sire||!dam){G.addEvent(`💔 ${p.damName}'s pregnancy lost — no longer on ranch.`,'bad');return}
      // Lethal white
      if(sire.genes.To[0]==='To'&&sire.genes.To[1]==='To'&&dam.genes.To[0]==='To'&&dam.genes.To[1]==='To'&&Math.random()<.25){
        G.addEvent(`💔 ${p.sireName} × ${p.damName} foal born Lethal White — did not survive.`,'death');return}
      // Foal success chance — bypass entirely for tutorial pregnancy
      let fsc=G._tutorialBreeding?1.0:foalSuccessChance(dam);
      if(Math.random()>fsc){
        // Failed birth — single roll, mutually exclusive outcomes
        // 0–2%: dam dies; 2–14%: dam injured (exactly 12%); 14–100%: stillbirth only
        let failRoll=Math.random();
        if(failRoll<0.02){
          dam.dead=true;dam.deathCause='birth complication';dam.deathYear=G.year;
          G.horses=G.horses.filter(x=>x.id!==dam.id);
          G.addEvent(`💔 ${dam.name} died during birth. Foal lost.`,'death');
        }else if(failRoll<0.14){
          dam.conditions.push({name:'Birth Injury',type:'injury',severity:R(2,5),yearsUntreated:0,treatedThisYear:false});
          refreshStats(dam);
          G.addEvent(`⚠️ ${dam.name} suffered a birth injury — foal did not survive.`,'bad');
        }else{
          G.addEvent(`💔 ${dam.name}'s foal did not survive birth.`,'bad');
        }
        return;
      }
      let count=p.twins?2:1;
      if(p.twins&&Math.random()<.3){count=1;dam.conditions.push({name:'Twin Complication',type:'injury',severity:R(2,4),yearsUntreated:0,treatedThisYear:false});refreshStats(dam);
        G.addEvent(`⚠️ Twin complications for ${dam.name} — only one foal survived.`,'bad')}
      if(p.twins&&Math.random()<.05){dam.dead=true;dam.deathCause='birth';dam.deathYear=G.year;
        G.horses=G.horses.filter(x=>x.id!==dam.id);G.addEvent(`💔 ${dam.name} died during twin birth.`,'death')}
      let cap=RANCH_LEVELS[G.ranchLevel].cap;
      for(let i=0;i<count;i++){
        if(G.horses.filter(h=>!h.retired).length>=cap){G.addEvent(`🏠 No room for foal!`,'bad');break}
        let foal=breedFoal(sire,dam);
        if(!foal){G.addEvent(`💔 Stillborn foal from ${p.damName}.`,'death');continue}
        let bonus=RANCH_LEVELS[G.ranchLevel].breedBonus;
        if(bonus>0){foal.speed=clamp(foal.speed+R(0,bonus),1,100);foal.stamina=clamp(foal.stamina+R(0,bonus),1,100)}
        if(foal.inbreedCoeff>.2&&Math.random()<.4){foal.conditions.push({name:'Inbred Sickness',type:'sickness',severity:2,yearsUntreated:0,treatedThisYear:false});foal.health=calcHealth(foal);
          G.addEvent(`👶 ${foal.name} born sickly (inbred).`,'bad')}
        if(p.twins){foal.speed=clamp(foal.speed-R(3,8),1,100);foal.stamina=clamp(foal.stamina-R(3,8),1,100)}
        foal.health=Math.max(15,calcHealth(foal));
        G.horses.push(foal);
        if(G._tutorialBreeding){G._tutorialBreeding=false;G.tutStage='tut_done';}
        if(foal.mutationGene){G.showMutationReel(foal);}
        let sp=expressedSpecials(foal),sm=sp.length?' — '+sp.map(s=>SPECIAL_INFO[s].icon+' '+SPECIAL_INFO[s].name).join(', ')+'!':'';
        G._yearSummary.push(`🐣 ${foal.name} born! ${foal.coat} ${foal.gender==='M'?'colt':'filly'}${p.twins?' (twin)':''}${sm}`);
        G.addEvent(`🐣 ${sire.name} × ${dam.name} = <strong>${foal.name}</strong>! ${foal.coat} ${foal.gender==='M'?'colt':'filly'}${sm}`,'good');
      }
      if(p.twins&&count===2)G.addEvent(`🎉 Twins from ${dam.name}!`,'good');
      }catch(e){console.error('Delivery error:',e);G.addEvent(`💔 Complication during ${p.damName}'s delivery.`,'bad')}
    });
  },

  upgradeRanch(){
    let n=G.ranchLevel+1;if(n>4)return;let nl=RANCH_LEVELS[n];
    if(G.money<nl.cost){G.toast('Not enough!');return}
    G.money-=nl.cost;G.ranchLevel=n;
    G.addEvent(`🏠 Upgraded to ${nl.name}!`,'good');G.toast('🎉 '+nl.name+'!');G.updateUI();G.renderTab();

  // ===== NEXT YEAR + SUMMARY POPUP =====
  calcUpkeep(){
    let lvl=RANCH_LEVELS[G.ranchLevel];
    let activeH=G.horses.filter(h=>!h.retired);
    // $100/active horse, +$150 for horses over 14, $0 for retired, $75/pregnancy
    let horseCost=activeH.reduce((s,h)=>s+100+(h.age>14?150:0),0);
    let pregCost=G.pregnancies.length*75;
    return horseCost+pregCost+lvl.maint;
  },

    if(G.phase!=='playing'){G.toast('Buy a stallion first!');return}
    let upkeepEst=G.calcUpkeep();
    let html=`<h2>📅 Advance to Year ${G.year+1}?</h2>
      <div class="text-center text-sm text-muted" style="margin:8px 0">Horses age, pregnancies resolve, upkeep is paid, and a random event fires.</div>
      <div style="background:#FFF8E1;border-radius:10px;padding:10px;margin:8px 0">
        <div class="flex-row" style="margin-bottom:4px"><span class="text-sm">Horses on ranch:</span><strong>${G.horses.filter(h=>!h.retired).length} active${G.retired.length?' + '+G.retired.length+' retired':''}</strong></div>
        <div class="flex-row" style="margin-bottom:4px"><span class="text-sm">Pregnancies due:</span><strong>${G.pregnancies.filter(p=>p.dueYear<=G.year+1).length}</strong></div>
        <div class="flex-row"><span class="text-sm">Estimated upkeep:</span><strong class="money">~${money(upkeepEst)}</strong></div>
      </div>

      <button class="btn btn-ghost btn-block mt-sm" onclick="G.closeModal()">Stay in Year ${G.year}</button>`;
    $('modal-content').innerHTML=html;$('modal-bg').classList.add('show');
  },

  nextYear(){
    if(G.phase!=='playing'){G.toast('Buy a stallion first!');return}
    G.year++;G._yearSummary=[];
    G.deliverFoals();
    // Upkeep: uses same formula as calcUpkeep() for consistency
    let up=G.calcUpkeep();
    G.money=Math.max(0,G.money-up);
    G._yearSummary.push(`📋 Upkeep: ${money(up)}`);
    // Age all horses (including retired)
    let died=[];
    let allManaged=[...G.horses,...G.retired];
    allManaged.forEach(h=>{
      h.age++;
      if(h.healPool>0)h.healPool=Math.max(0,h.healPool-5);
      if(!h.retired){
        if(h.age>15){h.speed=Math.max(1,h.speed-R(1,3));h.stamina=Math.max(1,h.stamina-R(1,2))}
        worsenConditions(G,h);
        rollMenopause(G,h);
        refreshStats(h);
        if(h.age>20&&Math.random()<(h.age-20)*.15){h.dead=true;h.deathCause='old age';h.deathYear=G.year;died.push(h.name)}
        if(h.health<=0&&h.age>0){h.dead=true;h.deathCause='health';h.deathYear=G.year;died.push(h.name)}
      } else {
        // Retired: age only, small stat decay
        if(h.age>15){h.speed=Math.max(1,h.speed-R(0,1));h.stamina=Math.max(1,h.stamina-R(0,1))}
        refreshStats(h);
        if(h.age>22&&Math.random()<(h.age-22)*.1){h.dead=true;h.deathCause='old age';h.deathYear=G.year;died.push(h.name)}
      }
    });
    if(died.length){G._yearSummary.push(`🕊️ Passed away: ${died.join(', ')}`);G.addEvent(`🕊️ ${died.join(', ')} passed away.`,'death')}
    G.horses=G.horses.filter(h=>!h.dead);
    G.retired=G.retired.filter(h=>!h.dead);
    // Random event
    let evResult=G.fireRandomEvent();if(evResult)G._yearSummary.push(evResult);
    // Annual stud offer rolls
    G._pendingStudOffers=G._pendingStudOffers||[];
    G.horses.filter(h=>h.gender==='M'&&!h.retired&&!h.dead&&h.wins>=1).forEach(h=>{
      if(Math.random()<studOfferChance(h)){
        let fee=studOfferFee(h);
        G._pendingStudOffers.push({horseId:h.id,horseName:h.name,fee});
      }
    });
    // Refresh auction: always 6 lots, weighted by unlocked tiers (G.legacy.trophies)
    {
      let totalTrophies=G.legacy.trophies||0;
      let unlockedTiers=[];
      for(let i=1;i<=8;i++){if(AUCTION_TIERS[i].unlock<=totalTrophies)unlockedTiers.push(i);}
      if(!unlockedTiers.length)unlockedTiers=[1];
      let n=unlockedTiers.length;
      let tierWeights=unlockedTiers.map((_,i)=>{
        let fromEnd=n-1-i;
        if(fromEnd===0)return 35;if(fromEnd===1)return 25;if(fromEnd===2)return 15;
        return 25/Math.max(1,n-3);
      });
      G.auctionHorses=[];
      for(let i=0;i<6;i++)G.auctionHorses.push(generateAuctionLot(weightedPick(unlockedTiers,tierWeights)));
    }
    G.updateUI();G.showYearSummary();
  },

  fireRandomEvent(){
    let roll=Math.random(),pool;
    let activeHorses=G.horses.filter(h=>!h.retired);
    // Keep the tutorial breeding mare safe until the foal is born
    const TUT_PROTECT=['tut_buy','tut_train','tut_race','tut_breed','tut_waiting'];
    if(G.starterMare&&TUT_PROTECT.includes(G.tutStage)&&activeHorses.length>1){
      activeHorses=activeHorses.filter(h=>h.id!==G.starterMare.id);
    }
    if(roll<.01&&activeHorses.length>1)pool=EVENTS.catastrophic;
    else if(roll<.05&&activeHorses.length>0)pool=EVENTS.severe;
    else if(roll<.18&&activeHorses.length>0)pool=EVENTS.moderate;
    else if(roll<.4&&activeHorses.length>0)pool=EVENTS.mild;
    else pool=EVENTS.good;
    let ev=pick(pool),target=activeHorses.length?pick(activeHorses):null;
    let text=ev.text.replace('{name}',target?target.name:'a horse');
    let extra=ev.fx(G,target);if(typeof extra==='string')text+=' '+extra;
    G.horses=G.horses.filter(h=>!h.dead);G.horses.forEach(h=>refreshStats(h));
    G.addEvent(text,ev.type==='death'?'death':ev.type);
    return text;
  },

  // ===== MUTATION REEL =====
  showMutationReel(foal){
    let sg=foal.mutationGene;
    let info=SPECIAL_INFO[sg];
    let allTraits=SPECIAL_GENES;
    let cards=[];
    for(let i=0;i<34;i++){let t=i===29?sg:pick(allTraits);cards.push(t);}
    let cardHtml=cards.map((t,i)=>{
      let inf=SPECIAL_INFO[t];
      return `<div class="reel-card" id="rc-${i}"><div class="r-icon">${inf.icon}</div><div class="r-name">${inf.name}</div><div class="r-sub">${TRAIT_SUBS[t]||''}</div></div>`;
    }).join('');
    let overlay=document.createElement('div');
    overlay.id='mutation-reveal';
    overlay.style.cssText='position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(44,24,16,.95);display:flex;align-items:center;justify-content:center;z-index:400;padding:20px';
    overlay.innerHTML=`<div style="background:#F5E6C8;border-radius:18px;padding:20px 16px;max-width:380px;width:100%;text-align:center">
      <div style="font-size:28px">✨</div>
      <h2 style="color:#3D1C02;margin-bottom:4px">Mutation!</h2>
      <div class="text-xs text-muted" style="margin-bottom:8px">${foal.name} carries a rare trait</div>
      <div class="reel-wrap"><div class="reel-strip" id="reel-strip">${cardHtml}</div></div>
      <div id="reel-result" style="display:none;margin-top:10px"></div>
      <button class="btn btn-ghost btn-block mt-sm" id="reel-continue" style="display:none" onclick="document.getElementById('mutation-reveal').remove()">Continue</button>
    </div>`;
    $('app').appendChild(overlay);
    let cardW=88;
    let targetOffset=-(29*cardW-(300/2-cardW/2));
    let strip=document.getElementById('reel-strip');
    strip.style.transform='translateX(0px)';
    setTimeout(()=>{strip.style.transform=`translateX(${targetOffset}px)`;},50);

      let winCard=document.getElementById('rc-29');
      if(winCard)winCard.classList.add('winner');
      let res=document.getElementById('reel-result');

        res.innerHTML=`<div class="tag tag-special" style="font-size:14px;padding:6px 14px">${info.icon} ${info.name}</div>
          <div class="text-sm" style="color:#6B3A2A;margin-top:6px">${info.desc}</div>`;
        res.style.display='block';
      }
      let btn=document.getElementById('reel-continue');
      if(btn)btn.style.display='block';
    },4700);
  },

  // ===== FAMILY TREE =====
  showFamilyTree(id){
    let root=allHorses.find(x=>x.id===id)||G.retired.find(x=>x.id===id);if(!root)return;
    function getAnc(horseId,gen){
      if(gen>4||!horseId)return'';
      let h2=allHorses.find(x=>x.id===horseId);
      if(!h2)return`<div class="text-xs text-muted" style="margin-left:${gen*12}px">Unknown</div>`;
      let sp2=expressedSpecials(h2).map(s=>SPECIAL_INFO[s].icon).join('');
      let tags=`<span class="tag tag-${h2.gender==='M'?'m':'f'}">${h2.gender==='M'?'♂':'♀'}</span>`;
      if(h2.dead)tags+=`<span class="tag" style="background:#EEEEEE;color:#424242">💀</span>`;
      else if(h2.retired)tags+=`<span class="tag" style="background:#E0E0E0;color:#424242">🏡</span>`;
      if(sp2)tags+=`<span class="tag tag-special">${sp2}</span>`;
      let html2=`<div style="margin-left:${gen*12}px;padding:4px 6px;border-left:2px solid #D4A017;margin-bottom:3px">
        <span style="font-size:11px;font-weight:bold;color:#3D1C02">${h2.name}</span> ${tags}
        <span class="text-xs text-muted"> ${h2.coat}</span>
      </div>`;
      if(gen<4){html2+=getAnc(h2.sireId,gen+1);html2+=getAnc(h2.damId,gen+1);}
      return html2;
    }
    let html=`<h2>🌳 ${root.name}'s Family Tree</h2><div style="max-height:60vh;overflow-y:auto">`;
    let sire2=allHorses.find(x=>x.id===root.sireId),dam2=allHorses.find(x=>x.id===root.damId);
    if(!sire2&&!dam2){html+=`<div class="text-sm text-muted text-center">No known ancestors.</div>`;}
    else{
      if(sire2){html+=`<div class="sec-sub">Sire Line</div>${getAnc(root.sireId,0)}`;}
      if(dam2){html+=`<div class="sec-sub">Dam Line</div>${getAnc(root.damId,0)}`;}
    }
    html+=`</div><button class="btn btn-ghost btn-block mt-sm" onclick="G.showHorseDetail(${id})">← Back</button>`;
    $('modal-content').innerHTML=html;$('modal-bg').classList.add('show');
  },

      G.legacy.wins.slice().reverse().slice(0,10).forEach(w=>{
        let isDerby=w.race==='Kentucky Derby';
        h+=`<div class="card" style="padding:8px;${isDerby?'border-left:4px solid #D4A017':''}">
          <div class="flex-row"><strong>${isDerby?'👑 ':''} ${w.horse}</strong><span class="money">${money(w.prize)}</span></div>
          <div class="text-xs text-muted">${w.race} · Year ${w.year}</div>
        </div>`;
      });
    }
    if(!G.legacy.wins.length)h+=`<div class="empty"><div class="icon">🏆</div>No wins yet. Get racing!</div>`;
    return h;
  },

  // ===== HELPERS =====
  addEvent(t,type){G.events.unshift({text:t,type,year:G.year});if(G.events.length>60)G.events.pop()},
  toast(m,d){let t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d||2500)},
  closeModal(ev){if(ev&&ev.target!==$('modal-bg'))return;$('modal-bg').classList.remove('show')},
  updateUI(){
    $('money-disp').textContent=money(G.money);
    let activeHorses=G.horses.filter(h=>!h.retired).length;
    $('horse-disp').textContent=activeHorses+'/'+RANCH_LEVELS[G.ranchLevel].cap;
    $('ranch-disp').textContent='Lv'+G.ranchLevel;$('year-disp').textContent='Year '+G.year;G.renderTab();
  },

  // ===== DEBUG CONSOLE =====
  debugPanel(){
    if(!DEBUG_MODE)return;
    let p=$('debug-panel');if(!p)return;
    p.classList.toggle('show');
    if(p.classList.contains('show'))G.renderDebug();
  },
  dbgClose(){let p=$('debug-panel');if(p)p.classList.remove('show')},
  dbgSelHorse(){
    let all=[...G.horses,...G.retired];
    let h=all.find(x=>x.id===G._debugHorseId);
    if(!h){h=all[0]||null;if(h)G._debugHorseId=h.id;}
    return h;
  },
  renderDebug(){
    let p=$('debug-panel');if(!p)return;
    let all=[...G.horses,...G.retired];
    let selH=G.dbgSelHorse();
    let hopts=all.map(h=>`<option value="${h.id}"${h===selH?'selected':''}>${h.name} ${h.gender==='M'?'♂':'♀'} A${h.age}${h.retired?' 🏡':''}</option>`).join('');
    p.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
  <span style="color:#D4A017;font-weight:bold;font-size:13px">🔧 DEBUG CONSOLE</span>
  <button class="dbg-btn" onclick="G.debugPanel()">✕ Close</button>
</div>

<div class="dbg-section"><div class="dbg-title">💰 Economy — ${money(G.money)}</div>
  <div class="dbg-row">
    <button class="dbg-btn gold" onclick="G.money+=1000;G.updateUI();G.renderDebug()">+$1K</button>
    <button class="dbg-btn gold" onclick="G.money+=10000;G.updateUI();G.renderDebug()">+$10K</button>
    <button class="dbg-btn gold" onclick="G.money+=100000;G.updateUI();G.renderDebug()">+$100K</button>
  </div>
  <div class="dbg-row">
    <input class="dbg-input" id="dbg-money-val" type="number" placeholder="amount">
    <button class="dbg-btn gold" onclick="let v=parseInt($('dbg-money-val').value);if(!isNaN(v)){G.money+=v;G.updateUI();G.renderDebug()}">Add</button>
    <button class="dbg-btn" onclick="let v=parseInt($('dbg-money-val').value);if(!isNaN(v)){G.money=v;G.updateUI();G.renderDebug()}">Set To</button>
  </div>
</div>

<div class="dbg-section"><div class="dbg-title">🐴 Spawn Horse</div>
  <div class="dbg-row">
    <button class="dbg-btn" onclick="G.dbgSpawn('random')">Random</button>
    <button class="dbg-btn green" onclick="G.dbgSpawn('racer')">Strong Racer</button>
    <button class="dbg-btn" onclick="G.dbgSpawn('mare')">Broodmare</button>
    <button class="dbg-btn gold" onclick="G.dbgSpawn('elite')">Elite Stallion</button>
  </div>
</div>

<div class="dbg-section"><div class="dbg-title">🎯 Selected Horse</div>
  <select class="dbg-select" style="margin-bottom:4px" onchange="G._debugHorseId=parseInt(this.value);G.renderDebug()">${hopts||'<option>No horses</option>'}</select>
  ${selH?`<div class="dbg-note">${selH.coat} ${selH.breed} · Spd ${selH.speed} Stam ${selH.stamina} · W${selH.wins}/${selH.races} · Tiers [${(selH.raceTiersCleared||[]).join(',')||'—'}] · ${selH.conditions.length} cond</div>`:'<div class="dbg-note">—</div>'}
  <div class="dbg-row" style="margin-top:4px">
    <input class="dbg-input" id="dbg-h-age" type="number" placeholder="age" min="0" max="30">
    <button class="dbg-btn" onclick="let v=parseInt($('dbg-h-age').value),h=G.dbgSelHorse();if(h&&!isNaN(v)){h.age=v;refreshStats(h);G.updateUI();G.renderDebug()}">Set Age</button>
    <input class="dbg-input" id="dbg-h-wins" type="number" placeholder="wins" min="0">
    <button class="dbg-btn gold" onclick="let v=parseInt($('dbg-h-wins').value),h=G.dbgSelHorse();if(h&&!isNaN(v)){h.wins=v;refreshStats(h);G.updateUI();G.renderDebug()}">Set Wins</button>
  </div>
  <div class="dbg-row">
    <button class="dbg-btn green" onclick="let h=G.dbgSelHorse();if(h){h.raceTiersCleared=[1,2,3,4,5,6,7,8,9];G.renderDebug()}">All Tiers ✅</button>
    <button class="dbg-btn" onclick="let h=G.dbgSelHorse();if(h){h.raceTiersCleared=[];G.renderDebug()}">Clear Tiers</button>
    <button class="dbg-btn" onclick="let h=G.dbgSelHorse();if(h){h.derbyEntered=false;G.renderDebug()}">Reset KD</button>
  </div>
  <div class="dbg-row">
    <button class="dbg-btn" onclick="G.dbgToggleRetire()">↩ Retire/Unretire</button>
    <button class="dbg-btn green" onclick="G.dbgHealAll()">💚 Full Heal</button>
    <button class="dbg-btn red" onclick="G.dbgAddCondition()">+ Condition</button>
    <button class="dbg-btn red" onclick="let h=G.dbgSelHorse();if(h){h.conditions=[];refreshStats(h);G.updateUI();G.renderDebug()}">Clear Conds</button>
  </div>
  <div class="dbg-row">
    <select class="dbg-select" id="dbg-ae-sel" style="width:auto;flex:1">
      <option value="s3">-3 Speed (minor)</option>
      <option value="st3">-3 Stamina (minor)</option>
      <option value="i2">+2% Inj Risk (minor)</option>
      <option value="s5">-5 Speed (moderate)</option>
      <option value="st5">-5 Stamina (moderate)</option>
      <option value="hc10">-10 Health Ceil (mod)</option>
      <option value="r2">-2 Max Races (mod)</option>
      <option value="i4">+4% Inj Risk (mod)</option>
    </select>
    <button class="dbg-btn red" onclick="G.dbgAddAE()">+ AE</button>
  </div>
</div>

<div class="dbg-section"><div class="dbg-title">🤰 Breeding — ${G.pregnancies.length} active</div>
  <div class="dbg-row">
    <button class="dbg-btn green" onclick="G.dbgForcePreg()">Force Pregnancy</button>
    <button class="dbg-btn green" onclick="G.dbgDeliverNow()">Deliver Now</button>
    <button class="dbg-btn gold${G.dbgForceMutation?' green':''}" onclick="G.dbgForceMutation=!G.dbgForceMutation;G.renderDebug()">${G.dbgForceMutation?'✅ Mutation Armed':'Force Mutation'}</button>
  </div>
</div>

<div class="dbg-section"><div class="dbg-title">✨ Mutation Reel — trigger manually</div>
  <div class="dbg-row">
    ${SPECIAL_GENES.map(sg=>`<button class="dbg-btn gold" title="${SPECIAL_INFO[sg].name}" onclick="G.dbgMutationReel('${sg}')">${SPECIAL_INFO[sg].icon} ${SPECIAL_INFO[sg].name.split(' ')[0]}</button>`).join('')}
  </div>
</div>

<div class="dbg-section"><div class="dbg-title">📅 Year ${G.year}</div>
  <div class="dbg-row">
    <button class="dbg-btn red" onclick="G.dbgAdvanceYear()">⏩ Advance Year</button>
    <button class="dbg-btn gold" onclick="G.dbgStudOffers()">💰 Trigger Stud Offers</button>
  </div>
</div>

<div class="dbg-note" style="text-align:center;margin-top:6px;color:#555">Shift+D to toggle · DEBUG_MODE=${DEBUG_MODE}</div>`;
  },

  dbgSpawn(type){
    let h;
    if(type==='random')h=makeHorse({age:R(2,7)});
    else if(type==='racer')h=makeHorse({gender:'M',age:3,tier:'high',bloodlineTier:'high',
      genes:{Sp:[pick(['D','E','F']),pick(['D','E','F'])],St:[pick(['E','F','G']),pick(['E','F','G'])]}});
    else if(type==='mare')h=makeHorse({gender:'F',age:R(3,6),tier:'mid',bloodlineTier:'mid'});
    else if(type==='elite')h=makeHorse({gender:'M',age:R(3,5),tier:'high',bloodlineTier:'elite',
      genes:{Sp:[pick(['A','B','C']),pick(['B','C','D'])],St:[pick(['B','C','D']),pick(['C','D','E'])]}});
    if(!h)return;
    G.horses.push(h);G.updateUI();G.renderDebug();G.toast('Spawned '+h.name+'!');
  },

  dbgToggleRetire(){
    let h=G.dbgSelHorse();if(!h)return;
    if(h.retired){
      h.retired=false;G.retired=G.retired.filter(x=>x.id!==h.id);G.horses.push(h);
      G.toast(h.name+' un-retired!');
    }else{
      h.retired=true;G.horses=G.horses.filter(x=>x.id!==h.id);G.retired.push(h);
      G.toast(h.name+' retired!');
    }
    G.updateUI();G.renderDebug();
  },

  dbgHealAll(){
    let h=G.dbgSelHorse();if(!h)return;
    h.conditions=[];h.healPool=30;refreshStats(h);
    G.toast(h.name+' fully healed!');G.updateUI();G.renderDebug();
  },

  dbgAddCondition(){
    let h=G.dbgSelHorse();if(!h)return;
    const cNames=['Sprained Tendon','Race Injury','Fever','Serious Infection','Cold','Parasites'];
    const cTypes=['injury','injury','sickness','sickness','sickness','sickness'];
    let i=R(0,cNames.length-1);
    let sev=R(2,6);
    h.conditions.push({name:cNames[i],type:cTypes[i],severity:sev,yearsUntreated:0,treatedThisYear:false});
    refreshStats(h);G.toast('Added '+cNames[i]+' (sev '+sev+') to '+h.name);G.updateUI();G.renderDebug();
  },

  dbgAddAE(){
    let h=G.dbgSelHorse();if(!h)return;
    let sel=$('dbg-ae-sel');if(!sel)return;
    const AE_MAP={
      s3:{type:'speed',val:3,desc:'-3 Speed (permanent)'},
      st3:{type:'stamina',val:3,desc:'-3 Stamina (permanent)'},
      i2:{type:'injChance',val:0.02,desc:'+2% injury risk'},
      s5:{type:'speed',val:5,desc:'-5 Speed (permanent)'},
      st5:{type:'stamina',val:5,desc:'-5 Stamina (permanent)'},
      hc10:{type:'healthCeil',val:10,desc:'-10 Health ceiling (permanent)'},
      r2:{type:'maxRaces',val:2,desc:'-2 max races'},
      i4:{type:'injChance',val:0.04,desc:'+4% injury risk'},
    };
    let ae=AE_MAP[sel.value];if(!ae)return;
    applyAftereffect(h,ae);refreshStats(h);
    G.toast('Applied '+ae.desc+' to '+h.name);G.updateUI();G.renderDebug();
  },

  dbgForcePreg(){
    let h=G.dbgSelHorse();
    let dam=(h&&h.gender==='F'&&!h.retired&&!h.menopausal)?h:G.horses.find(x=>x.gender==='F'&&!x.retired&&!x.menopausal);
    if(!dam){G.toast('No eligible mare!');return}
    if(G.pregnancies.some(p=>p.damId===dam.id)){G.toast(dam.name+' already pregnant!');return}
    let sire=G.horses.find(x=>x.gender==='M'&&!x.retired)||allHorses.find(x=>x.gender==='M');
    if(!sire){G.toast('No stallion available!');return}
    G.pregnancies.push({sireId:sire.id,damId:dam.id,sireName:sire.name,damName:dam.name,dueYear:G.year+1,twins:false});
    G.toast(dam.name+' x '+sire.name+' — due next year!');G.updateUI();G.renderDebug();
  },

  dbgDeliverNow(){
    if(!G.pregnancies.length){G.toast('No pregnancies!');return}
    G.pregnancies.forEach(p=>{p.dueYear=G.year});
    G.deliverFoals();G.toast('All pregnancies delivered!');G.updateUI();G.renderDebug();
  },

  dbgMutationReel(gene){
    let h=G.dbgSelHorse()||G.horses[0];
    if(!h){G.toast('No horse selected!');return}
    let fakeGenes=Object.assign({},h.genes,{special:Object.assign({},h.genes.special,{[gene]:[gene,gene]})});
    let fake=Object.assign({},h,{mutationGene:gene,genes:fakeGenes});
    G.dbgClose();
    G.showMutationReel(fake);
  },

  dbgAdvanceYear(){
    G.dbgClose();
    G.nextYear();
  },

  dbgStudOffers(){
    G.dbgClose();
    G._pendingStudOffers=G._pendingStudOffers||[];
    let eligible=G.horses.filter(h=>h.gender==='M'&&!h.retired);
    eligible.forEach(h=>{G._pendingStudOffers.push({horseId:h.id,horseName:h.name,fee:studOfferFee(h)})});
    G.toast(eligible.length+' stud offer(s) queued!');
    G.checkStudOffers();
  },
};
G.initCutscene();
document.addEventListener('keydown',function(e){if(DEBUG_MODE&&e.shiftKey&&(e.key==='D'||e.key==='d'))G.debugPanel()});
function _scaleApp(){
  const W=420,H=880;
  let s=Math.min(window.innerWidth/W,window.innerHeight/H);
  let a=document.getElementById('app');
  if(!a)return;
  a.style.transform='scale('+s+')';
  a.style.left=Math.round((window.innerWidth-W*s)/2)+'px';
  a.style.top=Math.round((window.innerHeight-H*s)/2)+'px';
  a.style.borderRadius=s>=1?'30px':'16px';
}
_scaleApp();
window.addEventListener('resize',_scaleApp);
</script>
</body>
</html>
